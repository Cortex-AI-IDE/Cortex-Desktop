<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
    <defs>
        <radialGradient id="g1" cx="82%" cy="6%" r="70%">
            <stop offset="0%" stop-color="#e8c547" stop-opacity="0.30"/>
            <stop offset="60%" stop-color="#e8c547" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="g2" cx="10%" cy="100%" r="70%">
            <stop offset="0%" stop-color="#785aff" stop-opacity="0.22"/>
            <stop offset="60%" stop-color="#785aff" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#f5d870"/>
            <stop offset="100%" stop-color="#c49a20"/>
        </linearGradient>
        <linearGradient id="head" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#f5d870"/>
        </linearGradient>
    </defs>

    <rect width="1200" height="630" fill="#060607"/>
    <rect width="1200" height="630" fill="url(#g1)"/>
    <rect width="1200" height="630" fill="url(#g2)"/>

    <!-- brand -->
    <g transform="translate(90, 86)">
        <rect width="64" height="64" rx="16" fill="url(#gold)"/>
        <text x="32" y="46" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="900" fill="#1a1400">C</text>
        <text x="84" y="44" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Cortex</text>
    </g>

    <!-- headline -->
    <text x="90" y="300" font-family="Inter, Arial, sans-serif" font-size="84" font-weight="800" letter-spacing="-3" fill="#ffffff">Your team's senior</text>
    <text x="90" y="396" font-family="Inter, Arial, sans-serif" font-size="84" font-weight="800" letter-spacing="-3" fill="url(#head)">engineer, on tap.</text>

    <!-- subline -->
    <text x="92" y="462" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="400" fill="#a1a1aa">The agentic AI code editor for Windows · Bring your own model.</text>

    <!-- chips -->
    <g font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500" fill="#f5d870">
        <rect x="90" y="512" width="216" height="50" rx="25" fill="#e8c5471f" stroke="#e8c5474d"/>
        <text x="120" y="544">🪟 Windows 10 &amp; 11</text>
        <rect x="324" y="512" width="234" height="50" rx="25" fill="#e8c5471f" stroke="#e8c5474d"/>
        <text x="354" y="544">🔒 Keys stay local</text>
    </g>
</svg>
