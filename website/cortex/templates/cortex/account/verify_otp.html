{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify — Cortex</title>
    <link rel="stylesheet" href="{% static 'cortex/css/account.css' %}?v=2026-07-11">
    <style>
        .otp-inputs { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        .otp-inputs input {
            width: 48px; height: 56px; text-align: center; font-size: 22px; font-weight: 700;
            border-radius: 10px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
            color: #fff; font-family: inherit;
        }
        .otp-inputs input:focus { border-color: var(--gold, #e8c547); outline: none; }
    </style>
</head>
<body class="auth-body">
<div class="auth-page">
    <div class="auth-card">
        <a href="{% url 'cortex:index' %}" class="auth-logo">
            <img class="brand-logo" src="{% static 'cortex/img/logo.png' %}?v=2026-07-11" alt="Cortex" width="32" height="32">
            <span>Cortex</span>
        </a>

        <h1 class="auth-title">Enter verification code</h1>
        <p class="auth-subtitle">We sent a 6-digit code to <strong>{{ email }}</strong></p>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="post" style="text-align:center;" id="otp-form">
            {% csrf_token %}
            <div class="otp-inputs" id="otp-inputs">
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" required>
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" required>
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" required>
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" required>
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" required>
                <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" required>
            </div>
            <input type="hidden" name="otp" id="otp-hidden">
            <button type="submit" class="auth-btn auth-btn-gold">Verify</button>
        </form>

        <p class="auth-links" style="margin-top:14px;">
            Didn't receive it? <a href="{% url 'account:signup' %}">Try again</a>
        </p>
    </div>
</div>

<script>
(function() {
    var inputs = document.querySelectorAll('#otp-inputs input');
    var form = document.getElementById('otp-form');
    var hidden = document.getElementById('otp-hidden');

    inputs.forEach(function(inp, i) {
        inp.addEventListener('input', function() {
            if (this.value && i < 5) inputs[i + 1].focus();
        });
        inp.addEventListener('keydown', function(e) {
            if (e.key === 'Backspace' && !this.value && i > 0) inputs[i - 1].focus();
        });
        inp.addEventListener('paste', function(e) {
            e.preventDefault();
            var paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
            paste.split('').forEach(function(ch, j) { if (inputs[j]) inputs[j].value = ch; });
        });
    });

    form.addEventListener('submit', function() {
        var code = '';
        inputs.forEach(function(inp) { code += inp.value; });
        hidden.value = code;
    });
})();
</script>
</body>
</html>
