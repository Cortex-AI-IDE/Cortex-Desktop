{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Cortex</title>
    <meta name="theme-color" content="#060607">

    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23e8c547'/><text x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' fill='%231a1400' font-size='19' font-weight='bold' font-family='Inter'>C</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'cortex/css/account.css' %}?v=2026-07-11">
</head>

<body class="auth-body">

    <div class="auth-page">
        <div class="auth-card">
            <a href="{% url 'cortex:index' %}" class="auth-logo">
                <img class="brand-logo" src="{% static 'cortex/img/logo.png' %}?v=2026-07-11" alt="Cortex" width="32" height="32">
                <span>Cortex</span>
            </a>

            <h1 class="auth-title">Reset your password</h1>
            <p class="auth-subtitle">Enter your email and we'll send you a 6-digit reset code</p>

            {% if error_message %}
                <div class="auth-error">{{ error_message }}</div>
            {% endif %}

            <form class="auth-form" method="post" action="{% url 'account:password-reset' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_email">Email address</label>
                    <input type="email" name="email" id="id_email" class="auth-input"
                           placeholder="you@example.com" autocomplete="email" autofocus required>
                </div>
                <button type="submit" class="auth-btn auth-btn-gold">Send Reset Code</button>
            </form>

            <p class="auth-links">
                Remember your password? <a href="{% url 'account:login' %}">Sign In</a>
            </p>
        </div>
    </div>

</body>

</html>
