{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete — Cortex</title>
    <meta name="theme-color" content="#060607">

    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23e8c547'/><text x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' fill='%231a1400' font-size='19' font-weight='bold' font-family='Inter'>C</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'cortex/css/account.css' %}?v=2026-07-11">
</head>

<body class="auth-body">

    <div class="auth-page">
        <div class="auth-card">
            <a href="{% url 'cortex:index' %}" class="auth-logo">
                <img class="brand-logo" src="{% static 'cortex/img/logo.png' %}?v=2026-07-11" alt="Cortex" width="32" height="32">
                <span>Cortex</span>
            </a>

            <div class="auth-success-icon">&#10003;</div>
            <h1 class="auth-title">Password reset complete</h1>
            <p class="auth-subtitle">
                Your password has been updated successfully.<br>
                You can now sign in with your new password.
            </p>

            <a href="{% url 'account:login' %}" class="auth-btn auth-btn-gold">Sign In</a>
        </div>
    </div>

</body>

</html>
