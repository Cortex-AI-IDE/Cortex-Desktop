{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cortex Admin{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'cortex/img/favicon_new.svg' %}?v=2026-07-11">
    <link rel="icon" type="image/png" href="{% static 'cortex/img/logo.png' %}?v=2026-07-11">
    <link rel="shortcut icon" href="{% static 'cortex/img/logo.png' %}?v=2026-07-11">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; display: flex; min-height: 100vh; }
        /* Sidebar */
        .sidebar { width: 220px; background: #161b22; border-right: 1px solid #21262d; padding: 20px 0; flex-shrink: 0; }
        .sidebar h2 { color: #e8c547; font-size: 16px; padding: 0 20px 20px; border-bottom: 1px solid #21262d; margin-bottom: 16px; }
        .sidebar nav a { display: block; padding: 10px 20px; color: #8b949e; text-decoration: none; font-size: 14px; transition: all .15s; }
        .sidebar nav a:hover, .sidebar nav a.active { color: #e6edf3; background: rgba(255,255,255,0.04); }
        .sidebar nav a .badge { float: right; background: #238636; color: #fff; border-radius: 10px; padding: 1px 8px; font-size: 11px; }
        /* Main */
        .main { flex: 1; padding: 24px; overflow-y: auto; }
        .main h1 { color: #e6edf3; font-size: 22px; margin-bottom: 4px; }
        .main .subtitle { color: #6b7280; font-size: 13px; margin-bottom: 24px; }
        /* Cards */
        .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 16px; }
        .stat-card .value { font-size: 28px; font-weight: 700; color: #e6edf3; }
        .stat-card .label { font-size: 12px; color: #6b7280; margin-top: 4px; }
        /* Tables */
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #21262d; font-size: 13px; }
        th { color: #6b7280; font-weight: 600; font-size: 12px; text-transform: uppercase; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        /* Badges */
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .badge-active { background: rgba(35,134,54,0.2); color: #3fb950; }
        .badge-cancelled { background: rgba(248,81,73,0.2); color: #f85149; }
        .badge-expired, .badge-past_due { background: rgba(210,153,34,0.2); color: #d29922; }
        .badge-pro { background: rgba(232,197,71,0.2); color: #e8c547; }
        .badge-free { background: rgba(107,114,128,0.2); color: #8b949e; }
        .badge-force { background: rgba(248,81,73,0.2); color: #f85149; }
        /* Forms */
        input, textarea, select { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; color: #c9d1d9; font-size: 14px; width: 100%; margin-bottom: 12px; }
        input:focus, textarea:focus, select:focus { border-color: #58a6ff; outline: none; }
        label { display: block; margin-bottom: 4px; font-size: 13px; color: #e6edf3; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; text-decoration: none; cursor: pointer; border: none; }
        .btn-primary { background: #238636; color: #fff; }
        .btn-primary:hover { background: #2ea043; }
        .btn-danger { background: #da3633; color: #fff; }
        .btn-ghost { background: rgba(255,255,255,0.06); color: #c9d1d9; border: 1px solid rgba(255,255,255,0.1); }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); }
        .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .checkbox-row input[type=checkbox] { width: auto; margin: 0; }
        /* Messages */
        .alert { padding: 10px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
        .alert-success { background: rgba(35,134,54,0.15); color: #3fb950; border: 1px solid rgba(35,134,54,0.3); }
        .alert-error { background: rgba(248,81,73,0.15); color: #f85149; border: 1px solid rgba(248,81,73,0.3); }
        /* Filter bar */
        .filter-bar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }
        .filter-bar input, .filter-bar select { width: auto; margin-bottom: 0; }
        /* Pagination */
        .empty-state { text-align: center; padding: 40px; color: #6b7280; }
        /* Pagination */
        .pagination { display: flex; gap: 4px; align-items: center; justify-content: center; padding: 20px 0 8px; }
        .pagination .pg-btn { padding: 6px 12px; border-radius: 6px; font-size: 13px; text-decoration: none; color: #c9d1d9; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); transition: all .15s; }
        .pagination .pg-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.15); }
        .pagination .pg-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
        .pagination .pg-btn.disabled { opacity: .4; pointer-events: none; }
        .pagination .pg-info { font-size: 12px; color: #6b7280; margin: 0 8px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2>⚡ Cortex Admin</h2>
        <nav>
            <a href="{% url 'adminpanel:dashboard' %}" {% if request.resolver_match.url_name == 'dashboard' %}class="active"{% endif %}>Dashboard</a>
            <a href="{% url 'adminpanel:users' %}" {% if 'users' in request.resolver_match.url_name %}class="active"{% endif %}>Users</a>
            <a href="{% url 'adminpanel:subscriptions' %}" {% if 'subscriptions' in request.resolver_match.url_name %}class="active"{% endif %}>Subscriptions</a>
            <a href="{% url 'adminpanel:releases' %}" {% if 'releases' in request.resolver_match.url_name %}class="active"{% endif %}>Releases</a>
            <a href="{% url 'adminpanel:downloads' %}" {% if 'downloads' in request.resolver_match.url_name %}class="active"{% endif %}>Downloads</a>
            <a href="{% url 'admin:index' %}">Django Admin →</a>
            <a href="{% url 'cortex:index' %}">← Back to Site</a>
        </nav>
    </aside>
    <main class="main">
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-{{ msg.tags }}">{{ msg }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
