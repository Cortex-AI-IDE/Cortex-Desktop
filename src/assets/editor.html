<!DOCTYPE html>
<html lang="en" style="background:#1e1e1e">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortex Editor</title>
    <!-- Prevent white flash: inline dark background before any CSS loads -->
    <style>
        /* ── Splash overlay: shows instantly, fades out when editor is ready ── */
        #splash-overlay {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: #1e1e1e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            transition: opacity 0.4s ease-out;
        }

        #splash-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        #splash-overlay svg {
            animation: splashBreathe 3s ease-in-out infinite;
        }

        #splash-overlay .splash-label {
            font: 600 11px/1 'Segoe UI', system-ui, sans-serif;
            color: #858585;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        @keyframes splashBreathe {

            0%,
            100% {
                opacity: .55
            }

            50% {
                opacity: .9
            }
        }
    </style>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Monaco Editor uses its own box-model — don't override it */
        .monaco-editor *,
        .monaco-editor *::before,
        .monaco-editor *::after {
            box-sizing: content-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #1e1e1e;
            position: relative;
        }

        /* Tab Bar */
        #tab-bar {
            display: flex;
            background: #252526;
            border-bottom: 1px solid #3c3c3c;
            height: 35px;
            overflow-x: auto;
            overflow-y: hidden;
            flex-shrink: 0;
        }

        #tab-bar::-webkit-scrollbar {
            height: 3px;
        }

        #tab-bar::-webkit-scrollbar-thumb {
            background: #424242;
            border-radius: 2px;
        }

        .tab {
            display: flex;
            align-items: center;
            padding: 0 12px;
            height: 35px;
            font-size: 13px;
            color: #969696;
            background: #2d2d2d;
            border-right: 1px solid #252526;
            cursor: pointer;
            white-space: nowrap;
            user-select: none;
            min-width: 80px;
            flex-shrink: 0;
            gap: 8px;
        }

        .tab.active {
            color: #ffffff;
            background: #1e1e1e;
            border-bottom: 2px solid #0078d4;
        }

        .tab:hover:not(.active) {
            background: #2a2a2a;
        }

        .tab:focus-visible {
            outline: 2px solid #0078d4;
            outline-offset: -2px;
        }

        .tab.modified::before {
            content: '\25CF';
            color: #ffffff;
            font-size: 14px;
            margin-right: 2px;
        }

        .tab .close-btn {
            font-size: 14px;
            color: #969696;
            line-height: 1;
            padding: 2px 4px;
            border-radius: 3px;
            margin-left: 4px;
        }

        .tab .close-btn:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.15);
        }

        .tab .close-btn:focus-visible {
            outline: 2px solid #0078d4;
            outline-offset: 1px;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.15);
        }

        /* No-open-files hint — Cortex branded */
        #no-files-hint {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            min-height: 0;
            gap: 8px;
            user-select: none;
        }

        /* ========== Cortex Ring Icon — AI Glow + Noise + Rotation ==========
     *
     * DESIGN CONCEPT: "The Cortex Core"
     * ──────────────────────────────────
     * The ring represents a neural loop — always processing, never sleeping.
     * Three layers work together:
     *   1. Gradient Ring (Purple → Cyan) — conic gradient, ring-shaped via mask
     *   2. Neural Noise — drifting fractal texture that feels like raw AI computation
     *   3. Aura Halo — soft radial glow that breathes with the ring
     *
     * BEHAVIOR:
     *   - Entry: fades in + scales up over 1.5s when page loads
     *   - Breathing: opacity pulses 0.65→0.90 over 5s (slower = more hypnotic)
     *   - Rotation: ring spins 360° every 25s (too fast = distracting)
     *   - Hover: ring brightens, spins faster, halo expands — feels responsive
     *
     * ====================================================================== */

        /* ── Entry animation ── */
        @keyframes cortexEntry {
            0% {
                opacity: 0;
                transform: scale(0.6);
                filter: blur(4px);
            }

            60% {
                opacity: 0.9;
                transform: scale(1.05);
                filter: blur(0);
            }

            100% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0);
            }
        }

        /* ── Slow breathing glow ── */
        @keyframes cortexBreathe {
            0% {
                box-shadow: 0 0 14px rgba(245, 197, 24, 0.14), 0 0 44px rgba(245, 197, 24, 0.04);
                opacity: 0.65;
            }

            50% {
                box-shadow: 0 0 30px rgba(245, 197, 24, 0.42), 0 0 74px rgba(245, 197, 24, 0.12);
                opacity: 0.90;
            }

            100% {
                box-shadow: 0 0 14px rgba(245, 197, 24, 0.14), 0 0 44px rgba(245, 197, 24, 0.04);
                opacity: 0.65;
            }
        }

        /* ── Slow rotation ── */
        @keyframes cortexSpin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* ── Faster spin on hover ── */
        @keyframes cortexSpinFast {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* ── Neural noise drift ── */
        @keyframes cortexNoise {
            0% {
                transform: translate(0, 0) scale(1);
            }

            15% {
                transform: translate(-1.5%, -1%) scale(1.015);
            }

            30% {
                transform: translate(1%, -1.5%) scale(1.01);
            }

            45% {
                transform: translate(-1%, 1.5%) scale(1.02);
            }

            60% {
                transform: translate(1.5%, 1%) scale(0.99);
            }

            75% {
                transform: translate(-1.5%, -1.5%) scale(1.015);
            }

            90% {
                transform: translate(1%, 1%) scale(1.01);
            }

            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        /* ── Brand mark: the Cortex hexagon-C logo as inline SVG (vector, no
           raster image). A gold gradient (dark→light yellow) slowly rotates
           so a bright band flows around the mark — the old purple "plasma"
           animator, recoloured and applied to the real logo. ── */
        #no-files-hint .cortex-icon-ring {
            width: 98px;
            height: 113px; /* logo aspect ~400:462 */
            margin-bottom: 12px;
            opacity: 0.96;
            /* No glow ring / breathing aura — just the clean logo. The only
               motion is the gradient flowing inside the mark (in the SVG)
               plus a one-time fade-in on load. */
            animation: cortexEntry 1.2s ease-out forwards;
            transition: filter 0.4s, transform 0.4s;
            cursor: pointer;
        }
        #no-files-hint .cortex-icon-ring .cortex-logo {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ── Hover: brighten + stronger gold glow ── */
        #no-files-hint .cortex-icon-ring:hover {
            opacity: 1 !important;
            filter: brightness(1.08) drop-shadow(0 0 16px rgba(245, 197, 24, 0.5));
            transform: scale(1.04);
        }

        /* ── Neural noise overlay (barely visible — feels subconscious) ── */
        #no-files-hint .cortex-icon-ring::after {
            display: none;  /* noise ring overlay retired with the ring mark */
        }

        /* ── Hover: noise becomes slightly more visible ── */
        #no-files-hint .cortex-icon-ring:hover::after {
            opacity: 0.18;
            transition: opacity 0.6s;
        }

        /* ── Glow aura retired: no circular ring behind the logo ── */
        #no-files-hint .cortex-icon-ring::before {
            display: none;
        }

        #no-files-hint .cortex-tagline {
            font-size: 22px;
            font-weight: 600;
            color: #cccccc;
            letter-spacing: 0.5px;
        }

        #no-files-hint .cortex-subtagline {
            font-size: 13px;
            color: #555555;
            font-style: italic;
        }

        /* Editor container */
        #editor-container {
            flex: 1;
            overflow: hidden;
        }

        #editor-container.hidden {
            display: none;
        }

        #image-preview {
            flex: 1;
            display: flex;
            width: 100%;
            background: #1e1e1e;
            align-items: center;
            justify-content: center;
            overflow: auto;
            padding: 20px;
            box-sizing: border-box;
            flex-direction: column;
            gap: 10px;
        }

        #image-preview.hidden {
            display: none;
        }

        /* File Path Breadcrumb Bar */
        #file-path-bar {
            display: none;
            align-items: center;
            background: #18181c;
            border-bottom: 1px solid #2a2a2e;
            padding: 0 16px;
            font-size: 12px;
            color: #888;
            flex-shrink: 0;
            gap: 0;
            height: 32px;
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            letter-spacing: 0.01em;
        }

        #file-path-bar.visible {
            display: flex;
        }

        #file-path-bar .path-sep {
            color: #5a7d9a;
            margin: 0 6px;
            font-size: 11px;
            font-weight: 700;
            opacity: 0.85;
            user-select: none;
        }

        #file-path-bar .path-part {
            color: #6a737d;
            cursor: default;
            padding: 2px 4px;
            border-radius: 3px;
            transition: color 0.15s, background 0.15s;
        }

        #file-path-bar .path-part:hover {
            color: #9ea7b0;
            background: rgba(255, 255, 255, 0.04);
        }

        #file-path-bar .path-part:last-child {
            color: #d4d8dd;
            font-weight: 600;
            font-size: 12.5px;
        }

        #file-path-parts {
            display: flex;
            align-items: center;
            min-width: 0;
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
            mask-image: linear-gradient(to right, transparent 0px, black 12px, black calc(100% - 12px), transparent 100%);
            -webkit-mask-image: linear-gradient(to right, transparent 0px, black 12px, black calc(100% - 12px), transparent 100%);
        }

        #file-path-bar .copy-path-btn {
            margin-left: auto;
            background: none;
            border: 1px solid transparent;
            color: #5a6370;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: color 0.15s, background 0.15s, border-color 0.15s;
            letter-spacing: 0.02em;
        }

        #file-path-bar .copy-path-btn:hover {
            color: #c8cdd3;
            background: rgba(255, 255, 255, 0.06);
            border-color: #3a3d42;
        }

        #file-path-bar .copy-path-btn.copied {
            color: #4ec9b0;
        }

        /* Dark theme only */

        /* Flash highlight for AI edit accept */
        .flash-highlight {
            background: rgba(78, 201, 176, 0.12) !important;
            animation: flash-fade 1.5s ease-out forwards;
        }

        @keyframes flash-fade {
            0% {
                background: rgba(78, 201, 176, 0.25);
            }

            100% {
                background: transparent;
            }
        }

        /* ═══ LIGHT THEME — activated by body.light-theme via setTheme(false).
           Palette: warm Anthropic/Claude scheme — MATCHES memory_management.css
           [data-theme="light"] (bg #ECE9E0, surfaces #E4E1D8/#DDDAD0, text
           #1A1814, terracotta accent #C96A3E). Rule: light backgrounds get
           DARK text — never light-hash gray. ═══ */
        body.light-theme #app { background: #ECE9E0; }
        body.light-theme #tab-bar { background: #E4E1D8; border-bottom-color: #CCC9C0; }
        body.light-theme #tab-bar::-webkit-scrollbar-thumb { background: #A8A59E; }
        body.light-theme .tab { color: #6B6860; background: #DDDAD0; border-right-color: #CCC9C0; }
        body.light-theme .tab.active { color: #1A1814; background: #ECE9E0; border-bottom-color: #C96A3E; }
        body.light-theme .tab:hover:not(.active) { background: #D6D3CA; }
        body.light-theme .tab.modified::before { color: #1A1814; }
        body.light-theme .tab .close-btn { color: #6B6860; }
        body.light-theme .tab .close-btn:hover,
        body.light-theme .tab .close-btn:focus-visible { color: #1A1814; background: rgba(26, 24, 20, 0.10); }
        body.light-theme #file-path-bar { background: #E4E1D8; border-bottom-color: #CCC9C0; color: #6B6860; }
        body.light-theme #file-path-bar .path-sep { color: #A8A59E; }
        body.light-theme #file-path-bar .path-part { color: #6B6860; }
        body.light-theme #file-path-bar .path-part:hover { color: #1A1814; background: rgba(26, 24, 20, 0.05); }
        body.light-theme #file-path-bar .path-part:last-child { color: #1A1814; }
        /* Empty-state welcome text — was hardcoded #cccccc/#555555 (calibrated
           for the dark background), reading as washed-out light gray on the
           light warm-beige page. */
        body.light-theme #no-files-hint .cortex-tagline { color: #1A1814; }
        body.light-theme #no-files-hint .cortex-subtagline { color: #6B6860; }
    </style>
</head>

    setTimeout(renderTabs, 0);
    // Always notify Python about active file change — even during scroll.
    // isScrolling only suppresses LSP cursor spam, not the active-file signal.
    _notifyActiveFile();
}

// Retry loading content into Monaco if it wasn't ready at switch time
var _editorRetryTimer = null;
var _editorRetryPath = null;
var _editorRetryCount = 0;
function scheduleEditorRetry(filePath) {
    var EDITOR_RETRY_INTERVAL_MS = 500;
    var EDITOR_RETRY_MAX_COUNT = 60;
    _editorRetryPath = filePath;
    _editorRetryCount = 0;
    if (_editorRetryTimer) clearInterval(_editorRetryTimer);
    _editorRetryTimer = setInterval(function() {
        _editorRetryCount++;
        if (editor && window.editorReady) {
            clearInterval(_editorRetryTimer);
            _editorRetryTimer = null;
            setEditorContent(_editorRetryPath);
            if (bridge) {
                var pos = editor.getPosition();
                bridge.onCursorChanged(_editorRetryPath, pos.lineNumber, pos.column);
            }
        } else if (_editorRetryCount > EDITOR_RETRY_MAX_COUNT) {
            clearInterval(_editorRetryTimer);
            _editorRetryTimer = null;
            console.error('[Editor] Retry timeout — Monaco never loaded for: ' + _editorRetryPath);
            _showMonacoLoadError('Editor timed out loading file. Click to retry.');
        }
    }, EDITOR_RETRY_INTERVAL_MS);
}

// Called by Python before openFile/openFileFromUri to declare which file should be active.
// openFile checks this to discard stale activate calls that arrive after the user switched away.
function setIntendedActive(filePath) {
    _intendedActiveFile = filePath;
}

// Called by Python to navigate to a specific line in the active editor.
function goToLine(lineNumber) {
    if (!editor || !activeFilePath) return;
    try {
        var pos = { lineNumber: lineNumber, column: 1 };
        editor.revealLineInCenter(lineNumber);
        editor.setPosition(pos);
        editor.focus();
    } catch(e) {
        console.warn('[Editor] goToLine failed:', e);
    }
}

function showImagePreview(filePath, dataUri, fileSize) {
    var preview = document.getElementById('image-preview');
    var img = document.getElementById('image-preview-img');
    var info = document.getElementById('image-preview-info');
    img.src = dataUri;
    var name = filePath.split(/[/\\]/).pop();
    info.textContent = name + (fileSize ? ' (' + fileSize + ')' : '');
    document.getElementById('editor-container').classList.add('hidden');
    document.getElementById('no-files-hint').style.display = 'none';
    preview.classList.remove('hidden');

    if (!openFiles[filePath]) {
        openFiles[filePath] = { path: filePath, language: 'image', content: '', modified: false, isImage: true };
        openOrder.push(filePath);
    }
    openFiles[filePath].isImage = true;
    // Cache dataUri/fileSize so switchToFile() can fully restore this image
    // (src + label + hidden-class toggling) when the user clicks back to
    // this tab later, without needing another round-trip to Python.
    openFiles[filePath].dataUri = dataUri;
    openFiles[filePath].fileSize = fileSize;
    activeFilePath = filePath;
    updateFilePathBar();
    renderTabs();
    _notifyActiveFile();
}

function hideImagePreview() {
    document.getElementById('image-preview').classList.add('hidden');
}

// Re-show the preview panel for an already-open image (neighbor activation
// after a tab close). Uses the dataUri/fileSize cached by showImagePreview().
function _restoreImagePreview(filePath) {
    var f = openFiles[filePath];
    if (!f) return;
    var img = document.getElementById('image-preview-img');
    var info = document.getElementById('image-preview-info');
    if (f.dataUri && img.src !== f.dataUri) img.src = f.dataUri;
    var name = filePath.split(/[/\\]/).pop();
    info.textContent = name + (f.fileSize ? ' (' + f.fileSize + ')' : '');
    document.getElementById('editor-container').classList.add('hidden');
    document.getElementById('no-files-hint').style.display = 'none';
    document.getElementById('image-preview').classList.remove('hidden');
}

// Called by Python: openFile(path, content, language, activate?)
function openFile(filePath, content, language, activate) {
    if (activate === undefined) activate = true;
    // Hide welcome screen immediately — prevents logo flash on first file open
    var _hint = document.getElementById('no-files-hint');
    if (_hint) _hint.style.display = 'none';
    // Gate: only activate if this file is still the intended active file.
    // Prevents queued openFile(path, ..., true) calls from overriding a
    // more recent user selection after async delivery delay.
    var shouldActivate = activate && (_intendedActiveFile === null || filePath === _intendedActiveFile);
    if (openFiles[filePath]) {
        // Already open — switch to it, update content if different.
        // ALWAYS clear the dirty flag: Python-pushed content is the source
        // of truth from disk.  This prevents the white dot from persisting
        // when a content-change comparison misses (race, same-content edit,
        // or double-delivery from the pump + switch_to_file flush).
        openFiles[filePath].modified = false;
        _updateTabModifiedClass(filePath, false);
        if (openFiles[filePath].content !== content) {
            openFiles[filePath].content = content;
            openFiles[filePath].language = language || openFiles[filePath].language;
            // Always update the model (even if not active) so that when the
            // user switches to this file they see fresh content, not stale.
            forceSetContent(filePath);
        }
        if (shouldActivate || !activeFilePath) switchToFile(filePath);
        else renderTabs();
        // ACK for already-open file update too
        if (bridge && bridge.onContentDelivered) {
            bridge.onContentDelivered(filePath, (content || '').length);
        }
        return;
    }

    // New file
    openFiles[filePath] = {
        path: filePath,
        language: language || 'plaintext',
        content: content || '',
        modified: false
    };
    openOrder.push(filePath);
    // FIX: Always switchToFile for new files — ensures the tab header
    // is rendered with the 'active' class and activeFilePath is set.
    // Previously, when shouldActivate was false and an active file existed,
    // only renderTabs() was called, which created the tab WITHOUT the
    // 'active' class, making it invisible against the dark tab bar.
    // This caused the "search result click opens file but no tab header" bug.
    switchToFile(filePath);

    // ── LSP: Immediately notify Python about the new file ──
    // Don't wait for the switch-settle timer — the LSP needs didOpen
    // as soon as the file enters the editor so diagnostics/completions
    // can start populating.  This is lightweight (single string message
    // through QWebChannel) and won't flood even during session restore
    // because Python's _open_file_js already throttles to 10s spacing.
    if (activate && bridge && bridge.notifyContentChanged) {
        bridge.notifyContentChanged(filePath, content || '', language || 'plaintext');
    }
    // ACK: Confirm content delivery to Python so _files_delivered_to_js
    // stays accurate.  Without this, Python must guess whether JS received
    // the content — and it guesses wrong after page crashes / warmup skips
    // (Fix 4 — Race Condition #1).
    if (bridge && bridge.onContentDelivered) {
        bridge.onContentDelivered(filePath, (content || '').length);
    }
    // SAFETY NET: Force a deferred renderTabs() to guarantee the tab header
    // is always visible, even if switchToFile/renderTabs above had a DOM timing issue.
    // This fixes the "search result click opens file but no tab header" bug.
    setTimeout(renderTabs, 0);
}

function _loadTextFromUri(fileUri, onDone) {
    try {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', fileUri, true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200 || xhr.status === 0) {
                    onDone(xhr.responseText || '', null);
                } else {
                    onDone('', 'HTTP ' + xhr.status);
                }
            }
        };
        xhr.onerror = function() { onDone('', 'XHR error'); };
        xhr.send();
    } catch (e) {
        onDone('', String(e));
    }
}

// Called by Python: openFileFromUri(path, language, fileUri, activate?)
function openFileFromUri(filePath, language, fileUri, activate) {
    if (activate === undefined) activate = true;
    // Hide welcome screen immediately — prevents logo flash on first file open
    var _hint = document.getElementById('no-files-hint');
    if (_hint) _hint.style.display = 'none';
    var shouldActivate = activate && (_intendedActiveFile === null || filePath === _intendedActiveFile);

    if (!openFiles[filePath]) {
        openFiles[filePath] = {
            path: filePath,
            language: language || 'plaintext',
            content: '',
            modified: false
        };
        openOrder.push(filePath);
    } else {
        openFiles[filePath].language = language || openFiles[filePath].language;
    }

    var token = (fileLoadTokens[filePath] || 0) + 1;
    fileLoadTokens[filePath] = token;
    openFiles[filePath].content = '// Loading...';

    if (shouldActivate || !activeFilePath) switchToFile(filePath);
    else renderTabs();

    _loadTextFromUri(fileUri, function(text, err) {
        if (fileLoadTokens[filePath] !== token) return; // superseded
        if (!openFiles[filePath]) return; // closed while loading
        if (err) openFiles[filePath].content = '// Failed to load file: ' + err;
        else openFiles[filePath].content = text || '';
        if (activeFilePath === filePath && editor) setEditorContent(filePath);
    });
}

// Called by Python: closeFile(path)
function closeFile(filePath) {
    // closeFile log removed — was flooding error.txt
    if (!openFiles[filePath]) return;
    // Dispose this file's Monaco model to free memory (per-file model cleanup).
    try {
        var _cm = openFiles[filePath].model;
        if (_cm && !_cm.isDisposed()) {
            // If the editor is currently showing it, detach first.
            if (editor && editor.getModel() === _cm) editor.setModel(null);
            _cm.dispose();
        }
    } catch (e) {}
    delete openFiles[filePath];
    var idx = openOrder.indexOf(filePath);
    if (idx >= 0) openOrder.splice(idx, 1);

    if (filePath === activeFilePath) {
        // Hide image preview if we were viewing an image
        hideImagePreview();
        // Switch to next available file or hide editor
        if (openOrder.length > 0) {
            var nextIdx = Math.min(idx, openOrder.length - 1);
            activeFilePath = openOrder[nextIdx];
            if (openFiles[activeFilePath] && openFiles[activeFilePath].isImage) {
                _restoreImagePreview(activeFilePath);
            } else {
                setEditorContent(activeFilePath);
            }
        } else {
            activeFilePath = null;
            // Keep model content — clearing it triggers tokenization that
            // makes the next openFile() more expensive (empty→content wave).
            // Just hide the editor area; the model will be overwritten on next open.
            document.getElementById('no-files-hint').style.display = 'flex';
            document.getElementById('editor-container').classList.add('hidden');
        }
        // Active tab changed (neighbor promoted or none left) — sync Python.
        _notifyActiveFile();
    }
    renderTabs();
    // closeFile bridge log removed — was flooding error.txt
    // Always notify Python of file closures — suppressing onFileClosed during
    // switching windows (isSwitchingFile) causes _open_files to desync from
    // Monaco's actual open tabs. When a user clicks a file that was silently
    // closed, the fast-path switch_to_file() fails silently (Monaco no longer
    // has the file) and the editor shows nothing.
    //
    // onFileClosed is lightweight (single string arg, called infrequently)
    // and does NOT contribute to the QWebChannel flooding that crashes
    // Chromium during startup (that's model.setValue() + LSP markers).
    if (bridge) bridge.onFileClosed(filePath);
}

// Called by Python: closeAllFiles() — closes all files in one shot, no
// per-file bridge.onFileClosed() calls or intermediate setEditorContent().
function closeAllFiles() {
    // closeAllFiles log removed — was flooding error.txt
    isSwitchingFile = true;
    if (switchStopTimer) clearTimeout(switchStopTimer);
    // Detach + dispose every per-file model before clearing.
    try { if (editor) editor.setModel(null); } catch (e) {}
    for (var _p in openFiles) {
        try {
            var _m = openFiles[_p] && openFiles[_p].model;
            if (_m && !_m.isDisposed()) _m.dispose();
        } catch (e) {}
    }
    // Clear all open files without triggering per-file switches
    openFiles = {};
    openOrder = [];
    activeFilePath = null;
    // Keep model content (no setValue('')) — see closeFile rationale above.
    document.getElementById('no-files-hint').style.display = 'flex';
    document.getElementById('editor-container').classList.add('hidden');
    hideImagePreview();
    renderTabs();
    // Release switching guard after a short settle
    switchStopTimer = setTimeout(function() {
        isSwitchingFile = false;
    }, SWITCH_STOP_MS);
    // Notify Python once for the batch
    if (bridge) bridge.onFileClosed('__ALL__');
}

// Called by Python: renameFileTab(oldPath, newPath, newName) — renames a tab
//   oldPath  = full absolute path of the file before rename
//   newPath  = full absolute path after rename
//   newName  = just the filename (basename) for display
function renameFileTab(oldPath, newPath, newName) {
    // Normalize path separators + case for cross-format matching
    // (Python may send backslashes, JS may have forward slashes, Windows is case-insensitive)
    var normOld = oldPath ? oldPath.replace(/\\/g, '/').toLowerCase() : oldPath;
    var f = openFiles[oldPath];
    if (!f) {
        // Case-insensitive normalized scan (handles C:\Users vs c:/users)
        for (var key in openFiles) {
            if (key.replace(/\\/g, '/').toLowerCase() === normOld) {
                f = openFiles[key];
                oldPath = key;
                break;
            }
        }
    }
    if (!f) {
        // Fallback: match by filename among open tabs (last resort)
        var oldName = oldPath ? oldPath.replace(/\\/g, '/').split('/').pop() : '';
        for (var key2 in openFiles) {
            if (oldName && key2.replace(/\\/g, '/').split('/').pop() === oldName) {
                f = openFiles[key2];
                oldPath = key2;
                console.log('[Editor] renameFileTab: matched by filename fallback:', oldName);
                break;
            }
        }
    }
    if (!f) {
        console.warn('[Editor] renameFileTab: could not find old path in openFiles:', oldPath,
            '| open keys:', Object.keys(openFiles).join(', '));
        return;
    }
    console.log('[Editor] renameFileTab:', oldPath, '->', newPath);
    // Update internal data
    delete openFiles[oldPath];
    f.path = newPath;
    openFiles[newPath] = f;
    // Update order
    var idx = openOrder.indexOf(oldPath);
    if (idx >= 0) openOrder[idx] = newPath;
    if (activeFilePath === oldPath) activeFilePath = newPath;
    // Update model URI — Monaco doesn't support renaming URIs,
    // so we create a new model with the same content + language.
    if (f.model && !f.model.isDisposed()) {
        var uri = monaco.Uri.parse('file:///' + newPath.replace(/\\/g, '/'));
        var newModel = monaco.editor.createModel(f.model.getValue(), f.model.getLanguageId(), uri);
        if (editor && editor.getModel() === f.model) editor.setModel(null);
        f.model.dispose();
        f.model = newModel;
        if (activeFilePath === newPath && editor) {
            editor.setModel(newModel);
            try { _clearAllMonacoMarkers(); } catch(e) {}
        }
    }
    renderTabs();
    updateFilePathBar();
    // If the ACTIVE tab was renamed, Python's mirror still holds the old path.
    if (activeFilePath === newPath) _notifyActiveFile();
}

// Called by Python: getContent(path) — returns current editor content
function getContent(filePath) {
    // Normalize path: Windows backslashes → forward slashes for consistent key lookup
    var normPath = filePath ? filePath.replace(/\\/g, '/') : filePath;
    // Try exact path first, then normalized
    var f = openFiles[filePath] || openFiles[normPath];
    if (!f) {
        for (var key in openFiles) {
            if (key.replace(/\\/g, '/') === normPath) { f = openFiles[key]; break; }
        }
    }
    // Always prefer the file's OWN model as source of truth (prevents ever
    // returning another file's text — the corruption this fix eliminates).
    if (f && f.model) {
        try { if (!f.model.isDisposed()) return f.model.getValue(); } catch (e) {}
    }
    if (activeFilePath === filePath && editor) {
        var _gm = editor.getModel();
        if (_gm) return _gm.getValue();
    }
    if (f) return f.content;
    return '';
}

// Called by Python: setTheme(isDarkFlag).
// Bug history: this ignored the flag and always set 'cortex-dark' with a
// "dark mode only" comment — the code editor could never render light mode
// no matter what the rest of the IDE did.
function setTheme(dark) {
    if (editor && typeof monaco !== 'undefined') {
        monaco.editor.setTheme(dark ? 'cortex-dark' : 'cortex-light');
    }
    document.body.className = dark ? '' : 'light-theme';
}

// Called by Python: getEditorContent(path) → returns fresh content from Monaco model
function getEditorContent(filePath) {
    // Normalize path: Windows backslashes → forward slashes for consistent key lookup
    var normPath = filePath ? filePath.replace(/\\/g, '/') : filePath;
    // Try exact path first, then normalized
    var f = openFiles[filePath] || openFiles[normPath];
    // Build a reverse lookup: find any key that matches after normalization
    if (!f) {
        for (var key in openFiles) {
            if (key.replace(/\\/g, '/') === normPath) {
                f = openFiles[key];
                break;
            }
        }
    }
    if (f && f.model) {
        try {
            if (!f.model.isDisposed()) {
                var val = f.model.getValue();
                if (!val || val.length === 0) {
                    console.warn('[Editor] getEditorContent: model returned empty for ' + filePath + ' (model exists, disposed=' + f.model.isDisposed() + ')');
                }
                return val;
            }
        } catch (e) {
            console.warn('[Editor] getEditorContent: model.getValue() error for ' + filePath + ': ' + e);
        }
    }
    if (activeFilePath === filePath && editor) {
        var _gm2 = editor.getModel();
        if (_gm2) {
            var val2 = _gm2.getValue();
            if (!val2 || val2.length === 0) {
                console.warn('[Editor] getEditorContent: editor.getModel() returned empty for ' + filePath);
            }
            return val2;
        }
    }
    if (f) {
        if (!f.content || f.content.length === 0) {
            console.warn('[Editor] getEditorContent: cached content is empty for ' + filePath + ' (in openFiles=' + !!f + ', activeFilePath=' + activeFilePath + ')');
        }
        return f.content;
    }
    console.warn('[Editor] getEditorContent: file not in openFiles: ' + filePath + ' (activeFilePath=' + activeFilePath + ', openFiles keys=' + Object.keys(openFiles).join(', ') + ')');
    return '';
}

// Called by Python: nextTab() — switch to the next tab in openOrder
function nextTab() {
    if (openOrder.length < 2) return;
    var idx = openOrder.indexOf(activeFilePath);
    if (idx < 0) idx = 0;
    var nextIdx = (idx + 1) % openOrder.length;
    switchToFile(openOrder[nextIdx]);
}

// Called by Python: prevTab() — switch to the previous tab in openOrder
function prevTab() {
    if (openOrder.length < 2) return;
    var idx = openOrder.indexOf(activeFilePath);
    if (idx < 0) idx = 0;
    var prevIdx = (idx - 1 + openOrder.length) % openOrder.length;
    switchToFile(openOrder[prevIdx]);
}

// Called by Python: markModified(path, flag)
function markModified(filePath, flag) {
    if (openFiles[filePath]) {
        openFiles[filePath].modified = flag;
        _updateTabModifiedClass(filePath, flag);
    }
}

// Called by Python: getActiveFile() → path or null
function getActiveFile() {
    return activeFilePath;
}

// Called by Python: getCursorPosition() → { line, column }
function getCursorPosition() {
    if (editor) {
        var pos = editor.getPosition();
        return { line: pos.lineNumber, column: pos.column };
    }
    return { line: 1, column: 1 };
}

// ============================================================================
// LSP Result Callbacks — called from Python via runJavaScript
// ============================================================================

// Called by Python: _lspCompletionsResult(requestId, suggestions, isIncomplete)




function scheduleDiagnostics() {
    // Called after scroll stops or file opens — first call is immediate,
    // subsequent calls are throttled to DIAG_THROTTLE_MS (2s).
    if (isScrolling || (lastScrollAt && (Date.now() - lastScrollAt) < SCROLL_SETTLE_MS) || isSwitchingFile || isRenderingMarkers || !bridge || !activeFilePath) return;
    if (!openFiles[activeFilePath]) return;

    // First diagnostic after file open — send immediately (unthrottled).
    // didOpen was already sent in openFile(), so the LSP server has the
    // file content and can respond with diagnostics right away.
    if (_firstDiag) {
        _firstDiag = false;
        if (isScrolling || (lastScrollAt && (Date.now() - lastScrollAt) < SCROLL_SETTLE_MS) || isSwitchingFile || !bridge || !activeFilePath) return;
        if (!openFiles[activeFilePath]) return;
        var f0 = openFiles[activeFilePath];
        bridge.requestDiagnostics('diag_' + (++diagSeq), activeFilePath, f0.language || 'plaintext');
        return;
    }

    if (diagTimer) clearTimeout(diagTimer);
    diagTimer = setTimeout(function() {
        diagTimer = null;
        if (isScrolling || (lastScrollAt && (Date.now() - lastScrollAt) < SCROLL_SETTLE_MS) || !bridge || !activeFilePath) return;
        if (!openFiles[activeFilePath]) return;
        var f = openFiles[activeFilePath];
        bridge.requestDiagnostics('diag_' + (++diagSeq), activeFilePath, f.language || 'plaintext');
    }, DIAG_THROTTLE_MS);
}

// Also called when file content changes (debounced via the content change handler)
function requestDiagnostics() {
    // LSP removed
}

// ============================================================================
// QWebChannel Bridge Setup
// ============================================================================
function initBridge(ch) {
    bridge = ch;
    // QWebChannel connected — no verbose log needed
    // NOTE: onEditorReady is emitted from Monaco init callback when the editor is truly ready,
    // not here (QWebChannel connects before Monaco finishes loading asynchronously).
}

new QWebChannel(qt.webChannelTransport, function(channel) {
    initBridge(channel.objects.bridge);
});

// ── Intercept external link clicks (Monaco URL detection) ──
// Monaco uses window.open() for clickable URLs in code. In QWebEngineView,
// this navigates the editor away (blank screen). Override to send URL to
// Python which opens it in the external browser.
var _originalWindowOpen = window.open;
window.open = function(url, target, features) {
    if (url && typeof url === 'string' && (url.startsWith('http://') || url.startsWith('https://'))) {
        if (bridge && bridge.openExternalUrl) {
            bridge.openExternalUrl(url);
        }
        return null;  // Block the navigation
    }
    // For non-URL opens (Monaco internals), use original
    return _originalWindowOpen.call(window, url, target, features);
};

// ── Rotating welcome message ──
(function() {
    var el = document.getElementById('welcome-subtagline');
    if (el && el.dataset.messages) {
        var msgs = el.dataset.messages.split('|');
        var idx = Math.floor(Math.random() * msgs.length);
        el.textContent = msgs[idx];
    }
})();

// ── Splash overlay fade-out ──
(function() {
    var splash = document.getElementById('splash-overlay');
    if (!splash) return;
    function hideSplash() {
        splash.classList.add('fade-out');
        setTimeout(function() { splash.remove(); }, 500);
    }
    if (document.readyState === 'complete') { hideSplash(); }
    else { window.addEventListener('load', hideSplash); }
    /* Safety: always hide after 5s even if load never fires */
    setTimeout(hideSplash, 5000);
})();
    </script>
