<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Cortex IDE — 15 Tool Spinners Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', sans-serif;
      padding: 32px;
    }

    h1 {
      color: #e6edf3;
      font-size: 22px;
      margin-bottom: 8px;
    }

    .sub {
      color: #8b949e;
      font-size: 13px;
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .card canvas {
      flex-shrink: 0;
    }

    .info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .name {
      color: #e6edf3;
      font-size: 14px;
      font-weight: 600;
    }

    .tool {
      color: #8b949e;
      font-size: 11px;
      font-family: Consolas, monospace;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
  </style>
</head>

<body>
  <h1>Cortex IDE — 15 Unique Tool Spinners</h1>
  <p class="sub">Each tool has a distinct animation. Colors match spinner.py exactly.</p>
  <div class="grid" id="grid"></div>

  <script>
    // ═══ Shared easing helpers (from spinner.py) ═══
        function sm(t) { t=Math.max(0,Math.min(1,t)); return t*t*(3-2*t); }
        function se(t) { return 0.5-0.5*Math.cos(Math.PI*t); }
        function tri(t) { return 1-Math.abs(2*(t%1)-1); }
        function hr(h) { return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}; }
        function ra(h,a) { const c=hr(h); return `rgba(${c.r},${c.g},${c.b},${a})`; }

        const TOOLS = [
  { name:"ArcSpinner",      tool:"read",        color:"#58a6ff", draw:drawArc },
  { name:"StackSpinner",    tool:"list_dir",    color:"#79c0ff", draw:drawStack },
  { name:"OrbitSpinner",    tool:"edit",        color:"#3fb950", draw:drawOrbit },
  { name:"PenSpinner",      tool:"write",       color:"#56d364", draw:drawPen },
  { name:"BarsSpinner",     tool:"grep",        color:"#bc8cff", draw:drawBars },
  { name:"ScatterSpinner",  tool:"glob",        color:"#d2a8ff", draw:drawScatter },
  { name:"RadarSpinner",    tool:"search",      color:"#bc8cff", draw:drawRadar },
  { name:"DotsSpinner",     tool:"terminal",    color:"#f0883e", draw:drawDots },
  { name:"PulseRing",       tool:"web_search",  color:"#56d4dd", draw:drawPulse },
  { name:"DownloadSpinner", tool:"web_fetch",   color:"#39c5cf", draw:drawDownload },
  { name:"GridSpinner",     tool:"thought",     color:"#7c6ce7", draw:drawGrid },
  { name:"CheckSpinner",    tool:"task",        color:"#e3b341", draw:drawCheck },
  { name:"TodoRingSpinner", tool:"todo",        color:"#a89df0", draw:drawTodoRing },
  { name:"NodesSpinner",    tool:"team",        color:"#ff7b72", draw:drawNodes },
  { name:"NeuralSpinner",   tool:"sem_search",  color:"#bc8cff", draw:drawNeural },
];

const grid = document.getElementById("grid");
const SIZE = 40;

TOOLS.forEach(t => {
  const card = document.createElement("div");
  card.className = "card";
  const canvas = document.createElement("canvas");
  canvas.width = SIZE; canvas.height = SIZE;
  canvas.style.width = SIZE+"px"; canvas.style.height = SIZE+"px";
  const info = document.createElement("div");
  info.className = "info";
  info.innerHTML = `<span class="name"><span class="dot" style="background:${t.color}"></span>${t.name}</span><span class="tool">${t.tool}</span>`;
  card.appendChild(canvas); card.appendChild(info);
  grid.appendChild(card);
  t.canvas = canvas; t.ctx = canvas.getContext("2d");
  t.t = Math.random() * 10;
});

function animate() {
  TOOLS.forEach(t => {
    t.t += 0.033;
    t.ctx.clearRect(0,0,SIZE,SIZE);
    t.draw(t);
  });
  requestAnimationFrame(animate);
}

// ── 1. ArcSpinner — read: sweeping arc with ghost tail ──
function drawArc(t) {
  const ctx = t.ctx, s = SIZE;
  const margin = s * 0.14;
  const cx = s/2, cy = s/2, r = (s - 2*margin)/2;
  const angleDeg = (t.t * 300) % 360;
  // Ghost tail: 3 arcs with fading alpha
  [{span:200,a:0.10,w:1.2},{span:120,a:0.20,w:1.5},{span:60,a:0.40,w:1.8}].forEach(({span,a,w}) => {
    ctx.strokeStyle = ra(t.color, a); ctx.lineWidth = w; ctx.lineCap = "round";
    ctx.beginPath();
    const start = (-angleDeg + 180) * Math.PI/180;
    ctx.arc(cx, cy, r, start, start + span * Math.PI/180, true);
    ctx.stroke();
  });
  // Bright leading arc
  ctx.strokeStyle = ra(t.color, 0.95); ctx.lineWidth = 2.0; ctx.lineCap = "round";
  ctx.beginPath();
  const start2 = (-angleDeg + 180) * Math.PI/180;
  ctx.arc(cx, cy, r, start2, start2 + 30 * Math.PI/180, true);
  ctx.stroke();
}

// ── 2. StackSpinner — list_dir: lines sweeping in from left ──
function drawStack(t) {
  const ctx = t.ctx, s = SIZE;
  const n = 4, rh = s * 0.13;
  const gap = (s * 0.82 - n * rh) / (n - 1);
  const y0 = s * 0.09, cycleT = (t.t * 0.9) % 1.0, maxW = s * 0.72;
  for (let i = 0; i < n; i++) {
    const rowStart = i / (n + 1), rowEnd = (i + 1.4) / (n + 1);
    const local = (cycleT - rowStart) / (rowEnd - rowStart);
    const progress = sm(Math.max(0, Math.min(1, local)));
    const w = maxW * progress, alpha = 0.3 + 0.65 * sm(progress);
    ctx.fillStyle = ra(t.color, alpha);
    ctx.beginPath();
    ctx.roundRect(s*0.14, y0 + i*(rh+gap), w, rh, rh*0.4);
    ctx.fill();
  }
}

// ── 3. OrbitSpinner — edit: two dots counter-orbiting with comet tails ──
function drawOrbit(t) {
  const ctx = t.ctx, s = SIZE;
  const cx = s/2, cy = s/2, r = s * 0.36;
  const dotR = Math.max(1.8, s * 0.12), spd = t.t * 2.2;
  // Faint track ring
  ctx.strokeStyle = ra(t.color, 0.10); ctx.lineWidth = 1.0;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
  // Two dots counter-orbiting
  [1, -1].forEach(dir => {
    const angle = spd * dir;
    for (let j = 4; j >= 1; j--) {
      const ta = angle - dir * j * 0.22;
      const tx = cx + r*Math.cos(ta), ty = cy + r*Math.sin(ta);
      ctx.fillStyle = ra(t.color, 0.08*(5-j));
      ctx.beginPath(); ctx.arc(tx, ty, dotR*(0.5+0.12*(4-j)), 0, Math.PI*2); ctx.fill();
    }
    const x = cx + r*Math.cos(angle), y = cy + r*Math.sin(angle);
    ctx.fillStyle = ra(t.color, 0.92);
    ctx.beginPath(); ctx.arc(x, y, dotR, 0, Math.PI*2); ctx.fill();
  });
}

// ── 4. PenSpinner — write: pen nib with ink trail ──
function drawPen(t) {
  const ctx = t.ctx, s = SIZE;
  const raw = (t.t * 0.75) % 1.0, ease = se(raw);
  const px = s*0.15 + s*0.70*ease, py = s*0.72;
  // Ink trail
  for (let j = 10; j >= 1; j--) {
    const tp = ((t.t*0.75) - j*0.03) % 1.0, te = se(tp);
    const tx = s*0.15 + s*0.70*te, ty = s*0.72 + s*0.06*Math.sin(tp*Math.PI*3);
    ctx.fillStyle = ra(t.color, 0.08+0.35*(j/10));
    ctx.beginPath(); ctx.arc(tx, ty, Math.max(0.7,s*0.045*(j/10)), 0, Math.PI*2); ctx.fill();
  }
  // Pen nib triangle
  const nib = s*0.13;
  ctx.fillStyle = ra(t.color, 0.92);
  ctx.beginPath(); ctx.moveTo(px,py+nib*0.7); ctx.lineTo(px-nib,py-nib*0.5); ctx.lineTo(px+nib,py-nib*0.5);
  ctx.closePath(); ctx.fill();
  // Ink dot at tip
  ctx.fillStyle = ra(t.color, 1.0);
  ctx.beginPath(); ctx.arc(px, py+nib*0.7, s*0.04, 0, Math.PI*2); ctx.fill();
}

// ── 5. BarsSpinner — grep: 5 equaliser bars with smooth sine ──
function drawBars(t) {
  const ctx = t.ctx, s = SIZE;
  const phases = [0.0, 0.28, 0.56, 0.84, 1.12];
  const n = 5, bw = s*0.11;
  const gap = (s - n*bw) / (n+1), maxH = s*0.72, minH = s*0.18;
  for (let i = 0; i < n; i++) {
    const raw = 0.5 + 0.5*Math.sin(t.t*5.5 + phases[i]*Math.PI*2);
    const h = minH + (maxH-minH)*sm(raw);
    const alpha = 0.45 + 0.55*((h-minH)/(maxH-minH));
    ctx.fillStyle = ra(t.color, alpha);
    ctx.beginPath(); ctx.roundRect(gap+i*(bw+gap), (s-h)/2, bw, h, bw*0.45); ctx.fill();
  }
}

// ── 6. ScatterSpinner — glob: 6 particles scatter then contract ──
function drawScatter(t) {
  const ctx = t.ctx, s = SIZE;
  const cx = s/2, cy = s/2, maxR = s*0.40, dotR = Math.max(1.2, s*0.09);
  const cycle = (t.t * 0.9) % 1.0;
  [0,60,120,180,240,300].forEach(deg => {
    const phase = (cycle + deg/720) % 1.0;
    let r, alpha;
    if (phase < 0.5) { r = maxR*sm(phase*2); alpha = 0.2+0.75*sm(phase*2); }
    else { r = maxR*(1-sm((phase-0.5)*2)); alpha = 0.2+0.75*(1-sm((phase-0.5)*2)); }
    const rad = (deg + t.t*25)*Math.PI/180;
    ctx.fillStyle = ra(t.color, alpha);
    ctx.beginPath(); ctx.arc(cx+r*Math.cos(rad), cy+r*Math.sin(rad), dotR, 0, Math.PI*2); ctx.fill();
  });
}

// ── 7. RadarSpinner — search: radar sweep with 8-ghost trail + centre dot ──
function drawRadar(t) {
  const ctx = t.ctx, s = SIZE;
  const cx = s/2, cy = s/2, R = s/2-1.5;
  // Dim outer ring
  ctx.strokeStyle = ra(t.color, 0.18); ctx.lineWidth = 1.0;
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.stroke();
  const angle = (t.t * 220) % 360;
  // 8 ghost lines behind the sweep
  for (let j = 8; j >= 1; j--) {
    const trailAngle = (angle - j*7)*Math.PI/180;
    ctx.strokeStyle = ra(t.color, 0.05+0.35*(1-j/8));
    ctx.lineWidth = Math.max(0.8, 1.5*(1-j/8)); ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+R*Math.cos(trailAngle),cy+R*Math.sin(trailAngle)); ctx.stroke();
  }
  // Bright sweep line
  const rad = angle*Math.PI/180;
  ctx.strokeStyle = ra(t.color, 0.90); ctx.lineWidth = 1.5; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+R*Math.cos(rad),cy+R*Math.sin(rad)); ctx.stroke();
  // Centre dot
  ctx.fillStyle = ra(t.color, 0.8);
  ctx.beginPath(); ctx.arc(cx,cy,s*0.07,0,Math.PI*2); ctx.fill();
}

// ── 8. DotsSpinner — terminal: 3 chasing dots with size pulse ──
function drawDots(t) {
  const ctx = t.ctx, s = SIZE;
  const cx = s/2, cy = s/2, r = s*0.33;
  const baseDot = Math.max(1.5, s*0.11), cycle = (t.t*1.4) % 1.0;
  for (let i = 0; i < 3; i++) {
    const offset = i/3.0, phase = (cycle - offset + 1.0) % 1.0;
    const scale = 0.6 + 0.5*sm(1.0-phase), alpha = 0.35+0.65*(1-phase);
    const angle = 2*Math.PI*(cycle-offset);
    ctx.fillStyle = ra(t.color, alpha);
    ctx.beginPath(); ctx.arc(cx+r*Math.cos(angle), cy+r*Math.sin(angle), baseDot*scale, 0, Math.PI*2); ctx.fill();
  }
}

// ── 9. PulseRing — web_search: 2 concentric rings + centre dot ──
function drawPulse(t) {
  const ctx = t.ctx, s = SIZE;
  const cx = s/2, cy = s/2, maxR = s*0.44;
  [0.0, 0.5].forEach(offset => {
    const phase = ((t.t*0.85)+offset) % 1.0;
    const r = maxR*se(phase), alpha = 0.85*(1-phase);
    ctx.strokeStyle = ra(t.color, alpha);
    ctx.lineWidth = Math.max(1.0, 2.5*(1-phase)); ctx.lineCap = "round";
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
  });
  ctx.fillStyle = ra(t.color, 0.7);
  ctx.beginPath(); ctx.arc(cx,cy,s*0.09,0,Math.PI*2); ctx.fill();
}

// ── 10. DownloadSpinner — web_fetch: chevron arrow + stem + baseline pulse ──
function drawDownload(t) {
  const ctx = t.ctx, s = SIZE;
  const cycle = (t.t*0.85) % 1.0, ease = se(cycle);
  const y = s*0.18 + s*0.52*ease;
  const alpha = 0.3+0.65*sm(1-Math.abs(ease-0.5)*2);
  // Vertical stem
  ctx.strokeStyle = ra(t.color, alpha*0.8); ctx.lineWidth = Math.max(1.2,s*0.09); ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(s*0.5, s*0.12); ctx.lineTo(s*0.5, y-s*0.02); ctx.stroke();
  // Chevron arrow
  const hw = s*0.22;
  ctx.strokeStyle = ra(t.color, alpha); ctx.lineWidth = Math.max(1.2,s*0.10);
  ctx.lineCap = "round"; ctx.lineJoin = "round";
  ctx.beginPath(); ctx.moveTo(s*0.5-hw, y-s*0.14); ctx.lineTo(s*0.5, y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(s*0.5+hw, y-s*0.14); ctx.lineTo(s*0.5, y); ctx.stroke();
  // Baseline pulse when arrow lands
  const landAlpha = Math.max(0, (ease-0.6)/0.4)*0.6;
  if (landAlpha > 0.01) {
    const expand = s*0.25*sm((ease-0.6)/0.4);
    ctx.strokeStyle = ra(t.color, landAlpha); ctx.lineWidth = Math.max(1.0,s*0.07);
    ctx.beginPath(); ctx.moveTo(s*0.5-expand, s*0.82); ctx.lineTo(s*0.5+expand, s*0.82); ctx.stroke();
  }
}

// ── 11. GridSpinner — thought/fallback: 4×4 breathing grid ──
const gridSquares = [];
for (let i=0;i<16;i++) {
  gridSquares.push({
    col:i%4, row:Math.floor(i/4),
    delay:Math.random()*1.5, dur:0.9+Math.random()*0.9,
    outer:[1,2,4,7,8,11,13,14].includes(i),
    corner:[0,3,12,15].includes(i)
  });
}
function drawGrid(t) {
  const ctx = t.ctx, s = SIZE;
  const unit = s/4.0, pad = unit*0.18, sq = unit-2*pad;
  gridSquares.forEach(cell => {
    if (cell.corner) return;
    const phase = ((t.t-cell.delay)/cell.dur) % 1.0;
    const eased = sm(tri(phase));
    const [lo,hi] = cell.outer ? [0.12,0.45] : [0.28,1.0];
    ctx.fillStyle = ra(t.color, lo+(hi-lo)*eased);
    ctx.beginPath(); ctx.roundRect(cell.col*unit+pad, cell.row*unit+pad, sq, sq, 1.5); ctx.fill();
  });
}

// ── 12. CheckSpinner — task: rows filling left to right ──
function drawCheck(t) {
  const ctx = t.ctx, s = SIZE;
  const n = 3, rh = s*0.12;
  const gap = (s*0.78-n*rh)/(n-1), x0 = s*0.11, maxW = s*0.78;
  const cycle = (t.t*0.7) % 1.0, active = Math.floor(cycle*n), rowPhase = (cycle*n) % 1.0;
  for (let i = 0; i < n; i++) {
    const y = s*0.11+i*(rh+gap);
    if (i < active) {
      ctx.fillStyle = ra(t.color, 0.55);
      ctx.beginPath(); ctx.roundRect(x0,y,maxW,rh,rh*0.4); ctx.fill();
    } else if (i === active) {
      const w = maxW*sm(rowPhase);
      ctx.fillStyle = ra(t.color, 0.90);
      ctx.beginPath(); ctx.roundRect(x0,y,w,rh,rh*0.4); ctx.fill();
      ctx.fillStyle = ra(t.color, 0.12);
      ctx.beginPath(); ctx.roundRect(x0+w,y,maxW-w,rh,rh*0.4); ctx.fill();
    } else {
      ctx.fillStyle = ra(t.color, 0.12);
      ctx.beginPath(); ctx.roundRect(x0,y,maxW,rh,rh*0.4); ctx.fill();
    }
  }
}

// ── 13. TodoRingSpinner — todo: full 360° spinning ring with trail + dot ──
function drawTodoRing(t) {
  const ctx = t.ctx, s = SIZE;
  const cx = s/2, cy = s/2;
  const margin = s*0.1, radius = (s-2*margin)/2;
  const ringW = Math.max(1.5, s*0.12);
  // Faint outer ring
  ctx.strokeStyle = ra(t.color, 0.12); ctx.lineWidth = ringW;
  ctx.beginPath(); ctx.arc(cx,cy,radius,0,Math.PI*2); ctx.stroke();
  const angle = (t.t*320) % 360;
  // Trailing tail segments
  [{span:280,a:0.06,m:0.6},{span:200,a:0.12,m:0.75},{span:130,a:0.22,m:0.9},{span:70,a:0.45,m:1.0}].forEach(({span,a,m}) => {
    ctx.strokeStyle = ra(t.color, a); ctx.lineWidth = ringW*m; ctx.lineCap = "round";
    ctx.beginPath();
    const startRad = (-angle+90)*Math.PI/180;
    ctx.arc(cx,cy,radius,startRad,startRad-span*Math.PI/180,true); ctx.stroke();
  });
  // Bright leading arc
  ctx.strokeStyle = ra(t.color, 0.92); ctx.lineWidth = Math.max(2.0,s*0.16); ctx.lineCap = "round";
  ctx.beginPath();
  const startRad2 = (-angle+90)*Math.PI/180;
  ctx.arc(cx,cy,radius,startRad2,startRad2-45*Math.PI/180,true); ctx.stroke();
  // Bright dot at leading edge
  const dotR = Math.max(1.2,s*0.09), dotAngle = (-angle+90)*Math.PI/180;
  const dotX = cx+radius*Math.cos(dotAngle), dotY = cy+radius*Math.sin(dotAngle);
  ctx.fillStyle = ra(t.color, 1.0);
  ctx.beginPath(); ctx.arc(dotX,dotY,dotR,0,Math.PI*2); ctx.fill();
  // Glow around dot
  ctx.fillStyle = ra(t.color, 0.15);
  ctx.beginPath(); ctx.arc(dotX,dotY,dotR*2,0,Math.PI*2); ctx.fill();
}

// ── 14. NodesSpinner — team: triangle nodes with sequential edge pulsing + slow rotation ──
function drawNodes(t) {
  const ctx = t.ctx, s = SIZE;
  const cx = s/2, cy = s/2, R = s*0.30;
  const nodeR = Math.max(1.8, s*0.12);
  const baseAngle = t.t*0.4;
  const pts = [90,210,330].map(a => ({
    x: cx+R*Math.cos(baseAngle+a*Math.PI/180),
    y: cy+R*Math.sin(baseAngle+a*Math.PI/180)
  }));
  const edgeCycle = (t.t*1.1) % 1.0;
  const edges = [[0,1],[1,2],[2,0]];
  const activeEdge = Math.floor(edgeCycle*3), edgePhase = (edgeCycle*3) % 1.0;
  // Draw edges
  for (let ei = 0; ei < 3; ei++) {
    const [a,b] = edges[ei];
    let alpha, width;
    if (ei === activeEdge) { alpha = 0.2+0.75*sm(tri(edgePhase)); width = 1.0+1.0*sm(tri(edgePhase)); }
    else { alpha = 0.15; width = 0.8; }
    ctx.strokeStyle = ra(t.color, alpha); ctx.lineWidth = width; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(pts[a].x,pts[a].y); ctx.lineTo(pts[b].x,pts[b].y); ctx.stroke();
  }
  // Draw nodes
  for (let i = 0; i < 3; i++) {
    const isSource = (i === edges[activeEdge][0]);
    const alpha = isSource ? 0.9 : 0.35+0.2*Math.sin(t.t*2-i);
    ctx.fillStyle = ra(t.color, alpha);
    ctx.beginPath(); ctx.arc(pts[i].x, pts[i].y, nodeR, 0, Math.PI*2); ctx.fill();
  }
}

// ── 15. NeuralSpinner — semantic search: vector space with converging dots + similarity links ──
function drawNeural(t) {
  const ctx = t.ctx, s = SIZE;
  const cx = s/2, cy = s/2;
  const N = 6, radii = [0.22,0.28,0.34,0.40,0.46,0.52];
  const speeds = [1.6,1.75,1.9,2.05,2.2,2.35];
  const phases = [0,60,120,180,240,300].map(d => d*Math.PI/180);

  // Centre "query" dot — breathing pulse
  const pulse = 0.5 + 0.5*Math.sin(t.t*2.8*Math.PI);
  const centreR = s*(0.07+0.04*pulse);
  const centreA = 0.55+0.40*pulse;
  ctx.fillStyle = ra(t.color, centreA);
  ctx.beginPath(); ctx.arc(cx,cy,centreR,0,Math.PI*2); ctx.fill();
  // Glow
  ctx.fillStyle = ra(t.color, 0.08+0.06*pulse);
  ctx.beginPath(); ctx.arc(cx,cy,centreR*(1.8+0.5*pulse),0,Math.PI*2); ctx.fill();

  // Compute dot positions
  const dots = [];
  for (let i = 0; i < N; i++) {
    const angle = phases[i] + t.t*speeds[i];
    const r = s*radii[i];
    dots.push({x: cx+r*Math.cos(angle), y: cy+r*Math.sin(angle), i});
  }

  // Active set (cycling)
  const cycle = (t.t*0.6) % 1.0;
  const offset = Math.floor(cycle*N) % N;
  const active = new Set([(offset)%N, (offset+1)%N, (offset+2)%N]);

  // Faint orbit rings
  ctx.strokeStyle = ra(t.color, 0.06); ctx.lineWidth = 0.5;
  for (let i = 0; i < N; i++) {
    ctx.beginPath(); ctx.arc(cx,cy,s*radii[i],0,Math.PI*2); ctx.stroke();
  }

  // Connection lines to active dots
  dots.forEach(d => {
    if (active.has(d.i)) {
      const la = 0.15+0.25*(0.5+0.5*Math.sin(t.t*4+d.i));
      ctx.strokeStyle = ra(t.color, la); ctx.lineWidth = Math.max(0.6,s*0.04);
      ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(d.x,d.y); ctx.stroke();
    }
  });

  // Draw dots
  dots.forEach(d => {
    let dr, da;
    if (active.has(d.i)) {
      dr = Math.max(1.4,s*0.10); da = 0.80+0.15*Math.sin(t.t*3+d.i);
    } else {
      dr = Math.max(1.0,s*0.065); da = 0.20+0.10*Math.sin(t.t*1.5+d.i);
    }
    ctx.fillStyle = ra(t.color, da);
    ctx.beginPath(); ctx.arc(d.x,d.y,dr,0,Math.PI*2); ctx.fill();
  });
}

animate();
  </script>
