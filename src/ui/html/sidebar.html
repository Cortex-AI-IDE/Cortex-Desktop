<!DOCTYPE html>
<html lang="en" style="background:#1e1e1e">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidebar</title>
  <!-- Prevent white flash: inline dark background before any CSS loads -->
  <style>
    /* ── Splash overlay: shows instantly, fades out when sidebar is ready ── */
    #splash-overlay {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #1e1e1e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.4s ease-out;
    }

    #splash-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #splash-overlay .splash-label {
      font: 600 11px/1 'Segoe UI', system-ui, sans-serif;
      color: #858585;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    @keyframes splashBreathe {

      0%,
      100% {
        opacity: .55
      }

      50% {
        opacity: .9
      }
    }
  </style>
  <style>
    /* =====================================================
   DARK THEME — matches sidebar.py QSS exactly
   ===================================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-sidebar: #1e1e1e;
      --bg-strip: #333333;
      --bg-panel: #252526;
      --bg-hover: #37373d;
      --bg-selected: #094771;
      --bg-selected-hover: #1a5c9e;
      --bg-active: rgba(0, 122, 204, 0.30);
      --border-accent: #007acc;
      --text-primary: #cccccc;
      --text-secondary: #858585;
      --text-muted: #555555;
      --text-white: #ffffff;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      --icon-size: 22px;
      --strip-width: 56px;
      --header-height: 30px;
      --scrollbar-w: 5px;
      --chevron-open: '\25BC';
      --chevron-closed: '\25B6';
      --search-input-bg: #2d2d2d;
      --search-input-bg-focus: #333333;
      --search-input-border: #444444;
      --search-clear-color: #888888;
      --search-clear-hover-color: #ffffff;
      --search-clear-hover-bg: rgba(255, 255, 255, 0.1);
    }

    /* Light mode color overrides — warm Anthropic/Claude palette, MATCHES
       editor.html and memory_management.css [data-theme="light"] exactly
       (bg #ECE9E0, surfaces #E4E1D8/#DDDAD0, text #1A1814, terracotta
       accent #C96A3E). All three light surfaces must look like one app.
       NOTE: --text-white is semantically "text on selected/hover rows",
       not literal white — on the light selection it MUST be dark or
       selected file names render invisible.
       --bg-selected-hover replaces a hardcoded #1a5c9e dark blue that
       leaked into light mode when hovering a selected row. */
    [data-theme="light"] {
      --bg-sidebar: #ECE9E0;
      --bg-strip: #E4E1D8;
      --bg-panel: #E4E1D8;
      --bg-hover: #DDDAD0;
      --bg-selected: rgba(201, 106, 62, 0.12);
      --bg-selected-hover: rgba(201, 106, 62, 0.20);
      --bg-active: rgba(201, 106, 62, 0.15);
      --border-accent: #C96A3E;
      --text-primary: #1A1814;
      --text-secondary: #6B6860;
      --text-muted: #A8A59E;
      --text-white: #1A1814;
      /* Explorer file-tree chevron — warm Claude terracotta, matching the
         accent used across editor.html / memory_management.css light mode. */
      --chevron-color: #C96A3E;
      /* Search box: was hardcoded #2d2d2d/#444/#888 — a dark search input
         floating on the warm light sidebar, with white-on-dark placeholder
         and typed text remaining readable only by accident. */
      --search-input-bg: #ffffff;
      --search-input-bg-focus: #ffffff;
      --search-input-border: #C9C4B6;
      --search-clear-color: #6B6860;
      --search-clear-hover-color: #1A1814;
      --search-clear-hover-bg: rgba(201, 106, 62, 0.12);
    }

    /* Icon hover tints are white-based for dark mode — invisible on light
       surfaces, so use warm terracotta-tinted tints in light mode (matches
       --border-accent / --chevron-color instead of a neutral gray). */
    [data-theme="light"] .tree-node:hover .icon {
      background: rgba(201, 106, 62, 0.06);
    }

    [data-theme="light"] .tree-node.selected .icon {
      background: rgba(201, 106, 62, 0.10);
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg-sidebar);
      color: var(--text-primary);
      font: 12px/1.5 var(--font);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ================================================
   LAYOUT
   ================================================ */
    .sidebar-root {
      display: flex;
      height: 100%;
      width: 100%;
    }

    .icon-strip {
      width: var(--strip-width);
      min-width: var(--strip-width);
      background: var(--bg-strip);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 4px 8px;
      gap: 6px;
      border-right: 1px solid #252526;
      z-index: 2;
    }

    .icon-strip .spacer {
      flex: 1;
    }

    .icon-btn {
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-primary);
      font-size: 20px;
      transition: all .1s;
      position: relative;
    }

    .icon-btn:hover {
      background: rgba(255, 255, 255, 0.10);
    }

    .icon-btn.checked {
      background: var(--bg-active);
      border-left: 3px solid var(--border-accent);
      border-radius: 0 8px 8px 0;
    }

    .icon-btn:active {
      background: rgba(0, 122, 204, 0.35);
    }

    /* Custom themed tooltip — replaces the native title="" tooltip.
       Bug history: a plain `title` attribute is rendered by Chromium's
       OWN native tooltip, entirely outside this page's CSS/data-theme —
       it always looked like a dark OS tooltip ("Explorer") floating over
       a light sidebar, no matter what theme was active. JS below moves
       `title` into `data-tip` and removes the attribute so Chromium never
       shows its native one; this div is shown/positioned instead. */
    #iconTooltip {
      position: fixed;
      z-index: 10000;
      display: none;
      padding: 4px 8px;
      border-radius: 4px;
      font: 12px var(--font);
      white-space: nowrap;
      pointer-events: none;
      background: #1f1f1f;
      color: #f0f0f0;
      border: 1px solid #3a3a3a;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
    }

    [data-theme="light"] #iconTooltip {
      /* Light surface, dark text — matches the rest of the light theme
         instead of a dark bubble floating over it. */
      background: #F4F1EA;
      color: #1A1814;
      border-color: #C9C4B6;
      box-shadow: 0 2px 8px rgba(26, 24, 20, 0.15);
    }

    .icon-btn svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    .panel-container {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel {
      display: none;
      flex: 1;
      overflow: hidden;
      flex-direction: column;
      background: var(--bg-panel);
    }

    .panel.active {
      display: flex;
    }

    /* ================================================
   SCROLLBARS
   ================================================ */
    ::-webkit-scrollbar {
      width: var(--scrollbar-w);
      height: var(--scrollbar-w);
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #5a5a5a;
      border-radius: 5px;
      min-height: 20px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #6a6a6a;
    }

    /* ================================================
   SECTION HEADER (shared across panels)
   ================================================ */
    .section-header {
      display: flex;
      align-items: center;
      height: var(--header-height);
      padding: 0 10px 0 12px;
      gap: 8px;
      flex-shrink: 0;
    }

    .section-title {
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 1.2px;
      color: var(--text-secondary);
      text-transform: uppercase;
      line-height: var(--header-height);
    }

    .section-count {
      color: var(--text-muted);
      font-size: 10px;
      margin-left: 4px;
    }

    .header-spacer {
      flex: 1;
    }

    .header-btn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      border-radius: 3px;
      cursor: pointer;
      color: var(--text-secondary);
      /* changed from text-muted */
      font-size: 14px;
    }

    .header-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    /* ================================================
   FILE TREE — VS Code style
   ================================================ */
    .file-tree {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      padding: 4px 0;
      user-select: none;
    }

    /* Kill the orange Chromium focus outline on the tree container and nodes */
    .file-tree:focus,
    .tree-node:focus {
      outline: none;
    }

    /* Explorer empty state — VS Code-style "no folder open"  */
    .explorer-empty {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px 20px;
    }

    .explorer-empty.visible {
      display: flex;
    }

    .explorer-empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.35;
      line-height: 1;
    }

    .explorer-empty-title {
      font-size: 13px;
      font-weight: 600;
      color: #8a8a8a;
      margin-bottom: 6px;
    }

    .explorer-empty-hint {
      font-size: 11px;
      color: #555;
      max-width: 200px;
      line-height: 1.5;
    }

    /* VS Code-style solid primary button: full-width (capped), accent
       background, shortcut hint on its own line below — never wraps in
       the narrow sidebar. --border-accent is theme-aware (blue in dark,
       terracotta in light). */
    .explorer-empty-btn {
      margin-top: 18px;
      display: block;
      width: 100%;
      max-width: 190px;
      padding: 7px 12px;
      font-size: 12.5px;
      font-weight: 500;
      font-family: inherit;
      text-align: center;
      color: var(--text-primary, #ccc);
      /* Dark neutral button (no accent blue) — elevated gray with a
         subtle border, VS Code secondary-button style. Theme-aware via
         sidebar vars: dark #333/#37373d, light warm grays. */
      background: var(--bg-strip, #333333);
      border: 1px solid var(--bg-hover, #464647);
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .explorer-empty-btn:hover {
      background: var(--bg-hover, #37373d);
      border-color: var(--text-muted, #555);
    }

    .explorer-empty-btn:active {
      background: var(--bg-strip, #333333);
    }

    .explorer-empty-shortcut {
      margin-top: 10px;
      font-size: 11px;
      color: var(--text-secondary, #858585);
    }

    .explorer-empty-kbd {
      font-size: 10px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text-primary, #ccc);
      background: rgba(128, 128, 128, 0.14);
      border: 1px solid rgba(128, 128, 128, 0.25);
      border-radius: 3px;
      padding: 1px 6px;
      letter-spacing: 0.3px;
    }

    .tree-node {
      display: flex;
      align-items: center;
      height: 28px;
      padding-left: 8px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
    }

    .tree-node:hover {
      background: var(--bg-hover);
    }

    .tree-node.selected {
      background: var(--bg-selected);
      color: var(--text-white);
    }

    .tree-node.selected:hover {
      background: var(--bg-selected-hover);
    }

    .tree-node .indent {
      display: inline-block;
      min-width: 16px;
    }

    .tree-node .chevron {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      font-size: 10px;
      color: var(--chevron-color, #ccc);
      flex-shrink: 0;
      transition: transform .1s;
    }

    .tree-node .chevron.open {
      transform: rotate(90deg);
    }

    /* ── File Icon (SVG) ── */
    .tree-node .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      margin-right: 6px;
      border-radius: 4px;
      transition: background 0.15s ease;
    }

    .tree-node .icon svg,
    .icon-strip svg,
    .match-icon svg {
      width: 18px;
      height: 18px;
      shape-rendering: geometricPrecision;
      vector-effect: non-scaling-stroke;
    }

    /* Material Icon Theme <img> icons */
    .tree-node .icon img.mi-icon,
    .match-icon img.mi-icon {
      width: 18px;
      height: 18px;
      display: block;
      flex-shrink: 0;
      object-fit: contain;
    }

    .icon-strip svg {
      width: 22px;
      height: 22px;
    }

    .tree-node:hover .icon {
      background: rgba(255, 255, 255, 0.06);
    }

    .tree-node.selected .icon {
      background: rgba(255, 255, 255, 0.12);
    }

    .tree-node .icon svg {
      width: 18px;
      height: 18px;
      display: block;
      flex-shrink: 0;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.35));
      shape-rendering: geometricPrecision;
      image-rendering: -webkit-optimize-contrast;
      -webkit-font-smoothing: antialiased;
    }

    .tree-node .meta {
      margin-left: auto;
      padding-right: 8px;
      font-size: 11px;
      color: #666;
      flex-shrink: 0;
    }

    .tree-node .name {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tree-node.drag-over {
      background: var(--bg-active);
      outline: 1px solid var(--border-accent);
    }

    /* VS Code-style cut indicator: dimmed/ghost appearance */
    .tree-node.cut {
      opacity: 0.45;
      filter: grayscale(0.3);
    }

    .tree-node.cut:hover {
      opacity: 0.65;
    }

    /* ================================================
   FOLDER ROW (collapsible root)
   ================================================ */
    .folder-row {
      display: flex;
      align-items: center;
      height: 26px;
      padding: 0 6px 0 10px;
      gap: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .folder-row:hover {
      background: var(--bg-hover);
    }

    .folder-row .arrow {
      font-size: 9px;
      color: #ccc;
      transition: transform .1s;
    }

    .folder-row .arrow.open {
      transform: rotate(90deg);
    }

    .folder-row .name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ================================================
   SEARCH PANEL — Modern Redesign
   ================================================ */
    .search-panel-wrap {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .search-input-wrap {
      padding: 10px 14px 6px;
      flex-shrink: 0;
      position: relative;
    }

    .search-input-inner {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-input-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      pointer-events: none;
      display: flex;
      align-items: center;
    }

    .search-input-icon svg {
      width: 14px;
      height: 14px;
    }

    .search-input {
      width: 100%;
      height: 32px;
      padding: 0 30px 0 32px;
      background: var(--search-input-bg, #2d2d2d);
      border: 1px solid var(--search-input-border, #444);
      border-radius: 6px;
      color: var(--text-primary);
      font: 12px var(--font);
      outline: none;
      transition: all .2s ease;
    }

    .search-input::placeholder {
      color: var(--text-muted);
      font-style: italic;
    }

    .search-input:focus {
      border-color: var(--border-accent);
      background: var(--search-input-bg-focus, #333);
      box-shadow: 0 0 0 2px rgba(201, 106, 62, 0.15);
    }

    .search-clear {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--search-clear-color, #888);
      cursor: pointer;
      font-size: 12px;
      padding: 2px 4px;
      border-radius: 3px;
      transition: all .15s;
    }

    .search-clear:hover {
      color: var(--search-clear-hover-color, #fff);
      background: var(--search-clear-hover-bg, rgba(255, 255, 255, 0.1));
    }

    .search-toggle-row {
      display: flex;
      gap: 6px;
      padding: 8px 14px;
      flex-shrink: 0;
      align-items: center;
      border-bottom: 1px solid #333;
      overflow-x: auto;
      overflow-y: hidden;
      min-height: 36px;
      flex-wrap: wrap;
    }

    .search-toggle {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-weight: 500;
      transition: all .15s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .search-toggle.active {
      background: rgba(0, 122, 204, 0.2);
      border-color: var(--border-accent);
      color: #4fc3f7;
    }

    .search-toggle:hover:not(.active) {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .search-scope-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-right: 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .search-filter-chip {
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 10px;
      border: 1px solid #555;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .search-filter-chip.active {
      background: rgba(34, 197, 94, 0.15);
      border-color: #22c55e;
      color: #22c55e;
    }

    .search-filter-chip:hover {
      border-color: #888;
    }

    /* Search panel: ensure toggle row and scope section fit */
    .search-panel-wrap {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .search-toggle-row {
      display: flex;
      gap: 6px;
      padding: 8px 14px;
      flex-shrink: 0;
      align-items: center;
      border-bottom: 1px solid #333;
      overflow-x: auto;
      overflow-y: hidden;
      min-height: 36px;
    }

    .search-toggle {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-weight: 500;
      transition: all .15s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .search-toggle.active {
      background: rgba(0, 122, 204, 0.2);
      border-color: var(--border-accent);
      color: #4fc3f7;
    }

    .search-toggle:hover:not(.active) {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .search-scope-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-right: 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .search-filter-chip {
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 10px;
      border: 1px solid #555;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .search-results {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .search-results::-webkit-scrollbar {
      width: 4px;
    }

    .search-results::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 2px;
    }

    .search-result {
      display: flex;
      align-items: center;
      height: 26px;
      padding: 0 14px;
      cursor: pointer;
      gap: 8px;
      transition: background .1s, opacity .12s;
      border-left: 2px solid transparent;
      animation: resultFadeIn .15s ease-out;
      opacity: 1;
    }

    @keyframes resultFadeIn {
      from {
        opacity: 0;
        transform: translateX(-4px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .search-result:hover {
      background: var(--bg-hover);
      border-left-color: var(--border-accent);
    }

    .search-result .match-icon {
      color: #22c55e;
      font-size: 10px;
      flex-shrink: 0;
    }

    .search-result .match-icon svg {
      width: 14px;
      height: 14px;
      display: block;
    }

    .search-result .match-filename {
      color: var(--text-primary);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .search-result .match-line-num {
      color: var(--text-muted);
      font-size: 10px;
      font-family: var(--font-mono);
      flex-shrink: 0;
    }

    .search-result .match-context {
      color: var(--text-secondary);
      font-size: 11px;
      font-family: var(--font-mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 2;
    }

    .search-result .match-highlight {
      color: #ffd700;
      font-weight: 600;
      background: rgba(255, 215, 0, 0.15);
      border-radius: 2px;
      padding: 0 1px;
    }

    .search-status {
      padding: 6px 14px;
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
      border-top: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .search-status .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .search-status .status-dot.active {
      background: #22c55e;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .search-group-header {
      padding: 4px 14px;
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: #1e1e1e;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .search-group-header .file-count {
      background: #333;
      padding: 0 5px;
      border-radius: 8px;
      font-size: 9px;
    }

    .search-result .path {
      color: #888;
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-result .line-num {
      color: #888;
      font-size: 10px;
      font-family: var(--font-mono);
      min-width: 30px;
      text-align: right;
    }

    .search-status {
      font-size: 11px;
      color: var(--text-muted);
      padding: 4px 12px;
    }

    /* Git file row — handle long filenames with ellipsis */
    .git-file {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 12px;
      cursor: pointer;
      min-width: 0;
      overflow: hidden;
    }

    .git-file:hover {
      background: var(--bg-hover);
    }

    .git-file .fname {
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-primary, #e0e0e0);
    }

    .git-file .git-counts {
      flex-shrink: 0;
      margin-left: auto;
      padding-left: 4px;
      font-size: 11px;
      white-space: nowrap;
    }

    .git-add {
      color: #4caf50;
      margin-right: 4px;
    }

    .git-del {
      color: #f44336;
    }

    /* ================================================
   AI TOOLS PANEL
   ================================================ */
    .ai-actions {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 8px;
    }

    .ai-action-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border: none;
      background: transparent;
      border-radius: 4px;
      cursor: pointer;
      color: var(--text-primary);
      font-size: 12px;
      transition: background .1s;
    }

    .ai-action-btn:hover {
      background: var(--bg-hover);
    }

    .ai-action-btn .emoji {
      font-size: 16px;
    }

    /* ================================================
   GIT REVIEW PANEL
   ================================================ */
    .git-changes {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .git-file {
      display: flex;
      align-items: center;
      height: 28px;
      padding: 0 12px;
      cursor: pointer;
      gap: 6px;
    }

    .git-file:hover {
      background: var(--bg-hover);
    }

    .git-badge {
      font-size: 9px;
      padding: 1px 4px;
      border-radius: 2px;
      font-weight: bold;
      min-width: 20px;
      text-align: center;
    }

    .git-badge.added {
      background: #14532d;
      color: #4ade80;
    }

    .git-badge.modified {
      background: #1e3a5f;
      color: #60a5fa;
    }

    .git-badge.deleted {
      background: #5f1e1e;
      color: #f87171;
    }

    .git-badge.untracked {
      background: #3b3314;
      color: #facc15;
    }

    .git-file .fname {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-primary, #e0e0e0);
    }

    .git-file .git-counts {
      margin-left: 8px;
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-mono);
      flex-shrink: 0;
    }

    .git-file .git-add {
      color: #4caf50;
      margin-right: 4px;
    }

    .git-file .git-del {
      color: #f44336;
    }

    .git-bulk-bar {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      flex-shrink: 0;
      border-top: 1px solid #3c3c3c;
    }

    .git-bulk-bar.visible {
      display: flex;
    }

    .git-reject-all,
    .git-accept-all {
      padding: 4px 12px;
      font-size: 11px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
    }

    .git-reject-all {
      background: transparent;
      border: 1px solid #ef4444;
      color: #ef4444;
    }

    .git-reject-all:hover {
      background: #5f1e1e;
    }

    .git-accept-all {
      background: #14532d;
      border: 1px solid #166534;
      color: #4ade80;
    }

    .git-accept-all:hover {
      background: #16a34a;
      color: #fff;
    }

    /* Git Info Bar */
    .git-info-bar {
      padding: 8px 12px;
      border-bottom: 1px solid #3c3c3c;
      flex-shrink: 0;
    }

    .git-info-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .git-info-row:last-child {
      margin-bottom: 0;
    }

    .git-branch-icon {
      color: #9ca3af;
      flex-shrink: 0;
    }

    .git-branch-name {
      font-size: 12px;
      font-weight: 600;
      color: #e5e7eb;
      font-family: 'Consolas', 'Monaco', monospace;
    }

    .git-version-row {
      margin-bottom: 2px;
    }

    .git-version-text {
      font-size: 10px;
      color: #6b7280;
      font-family: 'Consolas', 'Monaco', monospace;
    }

    .git-status-row {
      gap: 10px;
    }

    .git-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
    }

    .git-status-badge.unstaged {
      color: #f59e0b;
    }

    .git-status-badge.untracked {
      color: #8b5cf6;
    }

    .git-status-badge.staged {
      color: #10b981;
    }

    .git-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }

    .git-dot.unstaged-dot {
      background: #f59e0b;
    }

    .git-dot.untracked-dot {
      background: #8b5cf6;
    }

    .git-dot.staged-dot {
      background: #10b981;
    }

    /* Git section headers (Unstaged, Untracked, Staged) */
    .git-section-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      user-select: none;
    }

    .git-section-header:hover {
      background: var(--bg-hover);
    }

    .git-section-header .chevron {
      font-size: 10px;
      transition: transform 0.15s;
      color: #6b7280;
    }

    .git-section-header.collapsed .chevron {
      transform: rotate(-90deg);
    }

    .git-section-header .count {
      background: #374151;
      color: #9ca3af;
      padding: 0 5px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 500;
    }

    .git-section-files {
      overflow: hidden;
    }

    .git-section-files.collapsed {
      display: none;
    }

    /* Empty state */
    .git-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      color: #555;
      text-align: center;
      font-size: 12px;
    }

    /* File line stats */
    .git-file .line-stats {
      display: flex;
      gap: 4px;
      font-size: 10px;
      font-family: 'Consolas', 'Monaco', monospace;
      flex-shrink: 0;
    }

    .git-file .line-add {
      color: #4ade80;
    }

    .git-file .line-del {
      color: #f87171;
    }


    /* ================================================
   CONTEXT MENU (custom)
   ================================================ */
    .context-menu {
      position: fixed;
      background: #252526;
      border: 1px solid #3c3c3c;
      border-radius: 4px;
      padding: 4px 0;
      min-width: 160px;
      z-index: 1000;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .5);
      display: none;
    }

    .context-menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-primary);
    }

    .context-menu-item:hover {
      background: var(--bg-selected);
      color: var(--text-white);
    }

    .context-menu-separator {
      height: 1px;
      background: #3c3c3c;
      margin: 4px 8px;
    }

    /* ================================================
   MODAL / DIALOG
   ================================================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal-box {
      background: #252526;
      border: 1px solid #3c3c3c;
      border-radius: 8px;
      padding: 20px;
      min-width: 320px;
      max-width: 400px;
    }

    .modal-box h3 {
      color: var(--text-primary);
      font-size: 13px;
      margin-bottom: 12px;
    }

    .modal-box input {
      width: 100%;
      padding: 6px 10px;
      background: #3c3c3c;
      border: 1px solid #555;
      border-radius: 4px;
      color: var(--text-primary);
      font: 12px var(--font);
      outline: none;
      margin-bottom: 12px;
    }

    .modal-box input:focus {
      border-color: var(--border-accent);
    }

    .modal-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .modal-buttons button {
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid #555;
      color: var(--text-primary);
    }

    .btn-cancel:hover {
      background: var(--bg-hover);
    }

    .btn-primary {
      background: var(--border-accent);
      border: 1px solid var(--border-accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: #1a8ad4;
    }

    .btn-danger {
      background: #5f1e1e;
      border: 1px solid #ef4444;
      color: #f87171;
    }

    .btn-danger:hover {
      background: #7f1e1e;
    }

    /* ================================================
   NOTIFICATION TOAST
   ================================================ */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      background: #333;
      border: 1px solid #555;
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 12px;
      z-index: 3000;
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
    }

    .toast.visible {
      opacity: 1;
    }
  </style>
</head>

<body>

  <!-- Splash overlay: dark background with Cortex logo -->
  <div id="splash-overlay">

  <!-- ═══════════════════════════════════════════════════
     SVG ICON SPRITE — Cortex IDE Sidebar
     All icons 16×16 viewBox. Referenced via <use xlink:href="#icon-{id}">
     ═══════════════════════════════════════════════════ -->
  <script>
    var _miMap = null, _miBase = 'icons/', _miReady = false;
    (function(){
      /* Use XMLHttpRequest — works on file:// where fetch() is blocked by CORS */
      try {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', _miBase + '_mapping.json', false); /* synchronous — blocks only on cold load */
        xhr.send(null);
        if (xhr.status === 200 || xhr.status === 0) { /* status 0 = file:// success */
          _miMap = JSON.parse(xhr.responseText);
          _miReady = true;
          console.log('[Icons] Material Icon Theme mapping loaded:', Object.keys(_miMap.fileExtensions || {}).length, 'extensions,',
            Object.keys(_miMap.folderNames || {}).length, 'folders,', Object.keys(_miMap.fileNames || {}).length, 'filenames');
        } else {
          console.warn('[Icons] XHR failed, status:', xhr.status);
        }
      } catch(e) {
        console.warn('[Icons] Failed to load _mapping.json:', e.message, '— falling back to resolveIconId()');
      }
    })();
  </script>

  <script>
    // Inlined qwebchannel.js — avoids qrc:/// dependency issues
// Minimal QWebChannel stub that PyQt6 auto-injects; if missing, we load from Python
/* =====================================================
   QWebChannel.js — Full inlined from Qt Project (LGPL)
   ===================================================== */
var QWebChannelMessageTypes = {signal:1,propertyUpdate:2,init:3,idle:4,debug:5,invokeMethod:6,connectToSignal:7,disconnectFromSignal:8,setProperty:9,response:10};
var QWebChannel = function(transport, initCallback) {
    if (typeof transport !== "object" || typeof transport.send !== "function") { console.error("QWebChannel: transport missing send()"); return; }
    var channel = this;
    this.transport = transport;
    this.objects = {};
    this.handlers = {};
    this.execCallbacks = {};
    this.execIdCounter = 0;
    this.transport.onmessage = function(msg) {
        var data = JSON.parse(msg.data);
        switch (data.type) {
        case QWebChannelMessageTypes.signal: channel.handleSignal(data); break;
        case QWebChannelMessageTypes.propertyUpdate: channel.handlePropertyUpdate(data); break;
        case QWebChannelMessageTypes.init: channel.handleInit(data); break;
        case QWebChannelMessageTypes.response: channel.handleResponse(data); break;
        case QWebChannelMessageTypes.idle: channel.handleIdle(); break;
        }
    };
    this.send = function(data) { channel.transport.send(JSON.stringify(data)); };
    this.handleIdle = function() { channel.transport.send(JSON.stringify({type: QWebChannelMessageTypes.init})); };
    this.handleInit = function(data) {
        if (!channel.transport.userInitialized) {
            channel.transport.userInitialized = true;
            data.objects.forEach(function(objInfo) {
                channel.objects[objInfo.name] = channel.unwrapQObject(objInfo);
            });
            if (initCallback) initCallback(channel);
        }
    };
    this.handleSignal = function(data) {
        var obj = channel.objects[data.object];
        if (obj && obj._signals && obj._signals[data.signal]) {
            obj._signals[data.signal].forEach(function(h) { h.apply(obj, data.args); });
        }
    };
    this.handlePropertyUpdate = function(data) {
        var obj = channel.objects[data.object];
        if (obj) { obj._properties = obj._properties || {}; data.properties.forEach(function(p) { obj._properties[p.name] = p.value; }); }
    };
    this.handleResponse = function(data) {
        var cb = channel.execCallbacks[data.id];
        if (cb) { delete channel.execCallbacks[data.id]; cb(data.result); }
    };
    this.unwrapQObject = function(objInfo) {
        var obj = {};
        if (objInfo.methods) {
            objInfo.methods.forEach(function(m) {
                if (m.namedReturnValue) {
                    obj[m.name] = function() {
                        var args = Array.prototype.slice.call(arguments);
                        var cb = (typeof args[args.length-1] === 'function') ? args.pop() : null;
                        channel.execCallbacks[++channel.execIdCounter] = cb || function(){};
                        channel.send({type: QWebChannelMessageTypes.invokeMethod, id: channel.execIdCounter, object: objInfo.name, method: m.name, args: args});
                    };
                } else {
                    obj[m.name] = function() {
                        channel.send({type: QWebChannelMessageTypes.invokeMethod, id: 0, object: objInfo.name, method: m.name, args: Array.prototype.slice.call(arguments)});
                    };
                }
            });
        }
        if (objInfo.properties) {
            objInfo.properties.forEach(function(p) {
                Object.defineProperty(obj, p.name, {
                    get: function() { return (obj._properties && obj._properties[p.name]); },
                    set: function(v) { obj._properties = obj._properties || {}; obj._properties[p.name] = v; channel.send({type:QWebChannelMessageTypes.setProperty,object:objInfo.name,property:p.name,value:v}); },
                    enumerable: true, configurable: true
                });
            });
        }
        if (objInfo.signals) {
            obj._signals = {};
            objInfo.signals.forEach(function(s) {
                obj._signals[s.name] = [];
                obj[s.name] = {
                    connect: function(h) { obj._signals[s.name].push(h); channel.send({type:QWebChannelMessageTypes.connectToSignal,object:objInfo.name,signal:s.name}); },
                    disconnect: function(h) { var i = obj._signals[s.name].indexOf(h); if (i>=0) obj._signals[s.name].splice(i,1); channel.send({type:QWebChannelMessageTypes.disconnectFromSignal,object:objInfo.name,signal:s.name}); }
                };
            });
        }
        return obj;
    };
    if (transport.userInitialized === undefined) channel.handleIdle();
};

// ─── Console bridge: JS logs → Python terminal ────────────
(function() {
  var _origDebug = console.log, _origLog = console.log, _origWarn = console.warn, _origError = console.error;
  function _send(level, args) {
    try {
      var msg = Array.from(args).map(function(a) {
        return typeof a === 'object' ? JSON.stringify(a) : String(a);
      }).join(' ');
      if (bridge) {
        if (level === 'error') bridge.consoleError(msg);
        else if (level === 'warn') bridge.consoleWarn(msg);
        else bridge.consoleLog(msg);
      }
    } catch(e) { /* swallow */ }
  }
  console.log = function() { _origDebug.apply(console, arguments); _send('log', arguments); };
  console.log   = function() { _origLog.apply(console, arguments);   _send('log', arguments); };
  console.warn  = function() { _origWarn.apply(console, arguments);  _send('warn', arguments); };
  console.error = function() { _origError.apply(console, arguments); _send('error', arguments); };
})();

// ─── QWebChannel Initialization ──────────────────────
function initBridge() {
  console.log('[Sidebar] initBridge START');
  console.log('[Sidebar] typeof QWebChannel =', typeof QWebChannel);
  console.log('[Sidebar] typeof qt =', typeof qt);
  if (typeof qt !== 'undefined') {
    console.log('[Sidebar] qt.webChannelTransport =', typeof qt.webChannelTransport, !!qt.webChannelTransport);
  }
  if (typeof QWebChannel !== 'undefined' && typeof qt !== 'undefined' && qt.webChannelTransport) {
    console.log('[Sidebar] QWebChannel conditions met - creating channel...');
    try {
      channel = new QWebChannel(qt.webChannelTransport, function(ch) {
        console.log('[Sidebar] QWebChannel callback FIRED, ch.objects keys:', Object.keys(ch.objects || {}));
        bridge = ch.objects.SidebarBridge;
        bridgeReady = true;
        console.log('[Sidebar] QWebChannel bridge ready, objects:', Object.keys(ch.objects));

        // QWebChannel bridge methods are ASYNC — must pass callbacks for return values
        if (bridge && bridge.getProjectPath) {
          bridge.getProjectPath(function(projectPath) {
            console.log('[Sidebar] Project path from Python:', projectPath);
            if (projectPath) {
              rootPath = projectPath;
              rootName = projectPath.split(/[/\\]/).filter(Boolean).pop() || 'Project';
              var lbl = document.getElementById('folderName');
              if (lbl) lbl.textContent = rootName;
              console.log('[Sidebar] Loading directory tree for:', projectPath);
              loadDirectoryTree(projectPath);
            } else {
              console.log('[Sidebar] getProjectPath returned empty/falsy — showing empty state');
              setTimeout(function() { loadStandaloneTree(); }, 500);
            }
          });
        }

        // ── Flush any pending lazy-load requests that were queued before bridge was ready ──
        if (window._pendingLazyLoads && window._pendingLazyLoads.length > 0) {
          console.log('[Sidebar] Flushing', window._pendingLazyLoads.length, 'pending lazy-load requests');
          var pending = window._pendingLazyLoads;
          window._pendingLazyLoads = [];
          pending.forEach(function(dirPath) {
            console.log('[Sidebar] Retrying lazy-load for:', dirPath);
            bridge.loadSubDirectory(dirPath);
          });
        }

        // ── Flush any pending file-open requests that were queued before bridge was ready ──
        if (window._pendingFileOpens && window._pendingFileOpens.length > 0) {
          console.log('[Sidebar] Flushing', window._pendingFileOpens.length, 'pending file-open requests');
          var pendingFiles = window._pendingFileOpens;
          window._pendingFileOpens = [];
          pendingFiles.forEach(function(filePath) {
            console.log('[Sidebar] Retrying file-open for:', filePath);
            callBridge('onFileOpened', filePath);
          });
        }

        // ── Flush any queued callBridge calls that were buffered before bridge was ready ──
        if (window._pendingBridgeCalls && window._pendingBridgeCalls.length > 0) {
          console.log('[Sidebar] Flushing', window._pendingBridgeCalls.length, 'pending bridge calls');
          var pendingCalls = window._pendingBridgeCalls;
          window._pendingBridgeCalls = [];
          pendingCalls.forEach(function(call) {
            try {
              if (bridge[call.method]) {
                bridge[call.method](...call.args);
              }
            } catch(e) {
              console.error('[Sidebar] Flushed bridge call failed:', call.method, e);
            }
          });
        }
      });
    } catch(e) {
      console.log('[Sidebar] QWebChannel init FAILED:', String(e));
    }
  } else {
    console.log('[Sidebar] QWebChannel NOT available — running standalone');
    setTimeout(function() { loadStandaloneTree(); }, 500);
  }
}

// Load directory from Python — PREFERS fire-and-forget loadDirectoryTree which
// pushes results via _call_js → SidebarBridge.onDirectoryTree (reliable, bypasses
// QWebChannel async callback that depends on namedReturnValue).
// Falls back to listDirectory with callback if loadDirectoryTree not available.
function loadDirectoryTree(dirPath, callback) {
  if (!dirPath) { console.warn('[Sidebar] loadDirectoryTree: no dirPath'); return; }

  // PREFERRED: fire-and-forget via QWebChannel bridge
  if (bridge && bridge.loadDirectoryTree) {
    console.log('[Sidebar] loadDirectoryTree via bridge:', dirPath);
    bridge.loadDirectoryTree(dirPath);
    // Store callback for onDirectoryTree to invoke after data arrives
    if (callback) window._treeLoadCallback = callback;
    return;
  }

  // FALLBACK: push native modal → Python _handle_native_modal picks it up
  // and calls loadDirectoryTree directly (bypasses QWebChannel)
  console.log('[Sidebar] loadDirectoryTree via native modal fallback:', dirPath);
  pushNativeModal('refreshTree', dirPath, '');
  if (callback) window._treeLoadCallback = callback;

  // LAST-RESORT FALLBACK: async callback via listDirectory
  if (bridge && bridge.listDirectory) {
    console.log('[Sidebar] loadDirectoryTree via listDirectory callback:', dirPath);
    bridge.listDirectory(dirPath, function(jsonStr) {
      try {
        var entries = typeof jsonStr === 'string' ? JSON.parse(jsonStr) : jsonStr;
        console.log('[Sidebar] listDirectory returned', Array.isArray(entries) ? entries.length : 'object', 'entries');
        updateFileTree(entries);
        if (callback) callback(entries);
      } catch(e) {
        console.error('[Sidebar] parse error loading tree:', e);
        if (callback) callback(null);
      }
    });
  }
}

// Standalone — show empty state when no bridge/project is available
// (NO hardcoded demo data — behaves like VS Code: empty sidebar on fresh install)
function loadStandaloneTree() {
  rootPath = '';
  rootName = 'Project';
  document.getElementById('folderName').textContent = rootName;
  fileTreeData = null;
  showExplorerEmpty();
}

// Toggle visibility between file tree and empty state
function showExplorerEmpty() {
  var tree = document.getElementById('fileTree');
  var empty = document.getElementById('explorerEmpty');
  var folderRow = document.getElementById('folderRow');
  if (tree) tree.style.display = 'none';
  if (empty) empty.classList.add('visible');
  if (folderRow) folderRow.style.display = 'none';
}

function showExplorerTree() {
  var tree = document.getElementById('fileTree');
  var empty = document.getElementById('explorerEmpty');
  var folderRow = document.getElementById('folderRow');
  if (tree) tree.style.display = '';
  if (empty) empty.classList.remove('visible');

// Call Python via bridge (safe wrapper)
// ─── Native Modal Queue (for main_window dialogs) ──────
// Pushes modal requests that Python picks up and shows as real Qt dialogs
// (not confined to the sidebar webview).
function pushNativeModal(type, path, name) {
  if (!window._pendingNativeModals) window._pendingNativeModals = [];
  window._pendingNativeModals.push({ type: type, path: path, name: name });
  console.log('[Sidebar] Queued native modal:', type, path);
}

function callBridge(method, ...args) {
  // If QWebChannel bridge is ready, call directly.
  // If not ready yet, queue for flushing when bridge connects.
  if (bridge && bridgeReady) {
    try {
      if (bridge[method]) {
        bridge[method](...args);
      } else {
        console.warn('[Sidebar] Bridge method not found:', method);
      }
    } catch(e) {
      console.error('[Sidebar] Bridge call failed:', method, e);
    }
  } else {
    // Bridge not ready — queue for flush on initBridge success
    if (!window._pendingBridgeCalls) window._pendingBridgeCalls = [];
    window._pendingBridgeCalls.push({ method: method, args: args });
    console.log('[Sidebar] Queued bridge call (bridge not ready):', method, args);
  }
}

// ─── Panel Switching ───────────────────────────────────

// ─── MODAL DIALOG ──────────────────────────────────────
let modalResolve = null;
function showModal(title, value = '', confirmText = 'OK', isDestructive = false) {
  return new Promise((resolve) => {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalInput').value = value;
    // Hide input for confirm-only dialogs (e.g. delete)
    var input = document.getElementById('modalInput');
    var hasInput = title.toLowerCase().includes('rename') || title.toLowerCase().includes('new file') || title.toLowerCase().includes('new folder');
    input.style.display = hasInput ? '' : 'none';
    var confirmBtn = document.getElementById('modalConfirm');
    confirmBtn.textContent = confirmText;
    // Destructive styling (red)
    if (isDestructive) {
      confirmBtn.classList.add('btn-danger');
    } else {
      confirmBtn.classList.remove('btn-danger');
    }
    document.getElementById('modalOverlay').classList.add('visible');
    modalResolve = resolve;
    if (hasInput) setTimeout(() => input.focus(), 100);
    else setTimeout(() => confirmBtn.focus(), 100);
  });
}
document.getElementById('modalCancel').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('visible');
  if (modalResolve) modalResolve(null);
});
document.getElementById('modalConfirm').addEventListener('click', () => {
  var input = document.getElementById('modalInput');
  var val = input.style.display === 'none' ? 'confirmed' : input.value.trim();
  document.getElementById('modalOverlay').classList.remove('visible');
  if (modalResolve) modalResolve(val || (input.style.display === 'none' ? 'confirmed' : null));
});
document.getElementById('modalInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('modalConfirm').click();
  if (e.key === 'Escape') document.getElementById('modalCancel').click();
});

// ─── CONTEXT MENU ──────────────────────────────────────
function _onContextMenuDismiss(e) {
  // Ignore right-clicks (they re-open the menu)
  if (e.button === 2) return;
  if (!e.target.closest('.context-menu')) {
    hideContextMenu();
  }
}
function showContextMenu(items, x, y) {
  const menu = document.getElementById('contextMenu');
  // Remove previous dismiss listener (clean up stale ones)
  document.removeEventListener('mousedown', _onContextMenuDismiss, true);
  menu.innerHTML = '';
  items.forEach(item => {
    if (item.separator) {
      const sep = document.createElement('div');
      sep.className = 'context-menu-separator';
      sep.setAttribute('role', 'separator');
      menu.appendChild(sep);
    } else {
      const el = document.createElement('div');
      el.className = 'context-menu-item';
      el.setAttribute('role', 'menuitem');
      el.textContent = item.label;
      el.addEventListener('click', () => {
        hideContextMenu();
        if (item.action) item.action();
      });
      menu.appendChild(el);
    }
  });
  menu.style.display = 'block';
  menu.style.left = Math.min(x, window.innerWidth - menu.offsetWidth - 10) + 'px';
  menu.style.top = Math.min(y, window.innerHeight - menu.offsetHeight - 10) + 'px';
  // Defer dismiss-listener registration to next event tick so the
  // trailing 'click' from right-click doesn't immediately close the menu.
  setTimeout(function() {
    document.addEventListener('mousedown', _onContextMenuDismiss, true);
  }, 0);
}
function hideContextMenu() {
  document.getElementById('contextMenu').style.display = 'none';
  document.removeEventListener('mousedown', _onContextMenuDismiss, true);
}

// ========================================================
// 1. FILE EXPLORER — Full Tree with Icons
// ========================================================

/**
 * Returns an <img> tag for a file/folder using Material Icon Theme.
 * Falls back to legacy sprite sheet if mapping not loaded yet.
 * @param {string} name - file or folder name
 * @param {boolean} isDir - true if directory
 * @returns {string} HTML string
 */
function getFileIcon(name, isDir) {
  if (_miReady && _miMap) {
    var iconName = _resolveMaterialIcon(name, isDir);
    return '<img class="mi-icon" src="' + _miBase + iconName + '.svg" width="16" height="16" alt="" loading="lazy">';
  }
  // Fallback: use resolveIconId → Material Icon Theme SVG files
  var iconName = resolveIconId(name, isDir);
  return '<img class="mi-icon" src="' + _miBase + iconName + '.svg" width="16" height="16" alt="" onerror="this.onerror=null;this.src=\'' + _miBase + (isDir ? 'folder' : 'file') + '.svg\'">';
}

function _resolveMaterialIcon(name, isDir, isExpanded) {
  var lower = name.toLowerCase();
  if (isDir) {
    // Exact folder name match (e.g. "node_modules" -> "folder-node")
    var fm = _miMap.folderNames;
    var icon = null;
    if (fm[lower]) icon = fm[lower];
    else if (fm['.' + lower]) icon = fm['.' + lower];
    else if (fm['_' + lower]) icon = fm['_' + lower];
    else if (fm['-' + lower]) icon = fm['-' + lower];
    else if (fm['__' + lower + '__']) icon = fm['__' + lower + '__'];
    else icon = _miMap.folder || 'folder';
    // For expanded folders, append -open suffix (e.g. "folder-src" -> "folder-src-open")
    if (isExpanded && icon.indexOf('-open') === -1) {
      return icon + '-open';
    }
    return icon;
  }
  // Exact filename match (e.g. "package.json" -> "nodejs", "Makefile" -> "makefile")
  var fn = _miMap.fileNames;
  if (fn[lower]) return fn[lower];
  // Extension match
  var dot = lower.lastIndexOf('.');
  if (dot >= 0) {
    var ext = lower.slice(dot + 1);
    var em = _miMap.fileExtensions;
    if (em[ext]) return em[ext];
    // Double extensions: .d.ts, .config.js, etc.
    var dot2 = lower.lastIndexOf('.', dot - 1);
    if (dot2 >= 0) {
      var ext2 = lower.slice(dot2 + 1);
      if (em[ext2]) return em[ext2];
    }
  }
