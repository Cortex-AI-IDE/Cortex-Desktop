// Build a tree structure from flat file list
function buildFileTree(fileList, root) {
  rootPath = root || '';
  const tree = { name: rootName, path: rootPath, isDir: true, children: [], expanded: true };
  const skipDirs = new Set(['.git', '__pycache__', 'node_modules', '.venv', '.idea', '.vs', 'build', 'dist', '.tox', 'memory']);

  fileList = fileList || [];

  // Sort: dirs first, then alpha
  fileList.sort((a, b) => {
    if (a.isDir && !b.isDir) return -1;
    if (!a.isDir && b.isDir) return 1;
    return a.name.localeCompare(b.name);
  });

  // Helper: recursively build children preserving expanded state from expandedPaths
  function _buildChildren(items) {
    return (items || []).map(function(c) {
      var isExpanded = c.isDir && expandedPaths.has(c.path);
      return {
        name: c.name,
        path: c.path,
        isDir: c.isDir,
        size: c.size || 0,
        modTime: c.modTime || '',
        childCount: c.childCount || 0,
        children: c.isDir ? _buildChildren(c.children || []) : null,
        expanded: isExpanded,
        _childrenLoaded: isExpanded
      };
    });
  }

  tree.children = fileList.map(f => ({
    name: f.name,
    path: f.path,
    isDir: f.isDir,
    size: f.size || 0,
    modTime: f.modTime || '',
    childCount: f.childCount || 0,
    children: f.isDir ? _buildChildren(f.children || []) : null,
    expanded: expandedPaths.has(f.path),
    _childrenLoaded: expandedPaths.has(f.path)
  }));

  return tree;
}

// Refresh file tree — called from Python bridge after file create/write/delete
// Reloads root then re-fetches children for all currently expanded directories
// so that newly created or deleted files appear/disappear immediately.
function _doRefreshTree() {
  if (typeof rootPath !== 'undefined' && rootPath) {
    // Save currently expanded paths before root refresh destroys them
    var expandedDirs = [];
    expandedPaths.forEach(function(p) { expandedDirs.push(p); });

    // FORCE FULL RE-RENDER: clear the data model so updateFileTree takes
    // the renderTree path instead of _incrementalTreeUpdate.
    // This ensures the Refresh button always works, even if the DOM was
    // cleared by a previous error or webview glitch.
    fileTreeData = null;
    var container = document.getElementById('fileTree');
    if (container) container.innerHTML = '';

    loadDirectoryTree(rootPath, function() {
      // After root reload completes, re-expand and reload children
      var reloadCount = 0;
      expandedDirs.forEach(function(dirPath) {
        expandedPaths.add(dirPath);
        if (bridge && bridge.loadSubDirectory) {
          bridge.loadSubDirectory(dirPath);
          reloadCount++;
        } else {
          pushNativeModal('loadSubDir', dirPath, '');
          reloadCount++;
        }
      });
      console.log('[Sidebar] _doRefreshTree: full re-render complete, expanded=' + reloadCount);
    });
  }
}

// Debounced refresh — prevents overlapping refresh calls
function refreshTree() {
  if (__refreshTimer) clearTimeout(__refreshTimer);
  __refreshTimer = setTimeout(function() {
    __refreshTimer = null;
    _doRefreshTree();
  }, DEBOUNCE_MS);
}

// Render tree recursively
function renderTree(treeData, container, depth = 0) {
  container.innerHTML = '';
  container.setAttribute('role', 'tree');
  container.setAttribute('aria-label', 'File Explorer');
  if (treeData && treeData.children && treeData.children.length > 0) {
    treeData.children.forEach(node => appendTreeNode(node, container, depth));
    showExplorerTree();
  } else {
    showExplorerEmpty();
  }
  treeRendered = true;
  // Attach container click once to deselect on empty-space click;
  // also attach contextmenu for root-level paste / new file / new folder.
  if (!window._treeClickInitialized) {
    window._treeClickInitialized = true;
    container.addEventListener('click', onTreeContainerClick);
    container.addEventListener('contextmenu', onTreeContainerContextMenu);
  }
}

function appendTreeNode(node, parent, depth) {
  const div = document.createElement('div');
  div.className = 'tree-node';
  div.setAttribute('role', 'treeitem');
  div.setAttribute('aria-label', node.name);
  if (selectedPath === node.path) {
    div.classList.add('selected');
    div.setAttribute('aria-selected', 'true');
  }
  if (node.isDir) {
    div.setAttribute('aria-expanded', node.expanded ? 'true' : 'false');
  }
  div.dataset.path = node.path;
  div.dataset.isDir = node.isDir;
  div.dataset.testid = 'tree-node';
  div.style.paddingLeft = (10 + depth * TREE_INDENT_PX) + 'px';

  // Chevron
  const chevron = document.createElement('span');
  chevron.className = 'chevron';
  if (node.isDir) {
    chevron.textContent = '\u25B6';
    if (node.expanded) chevron.classList.add('open');
  } else {
    chevron.textContent = ' ';
    chevron.style.visibility = 'hidden';
  }
  div.appendChild(chevron);

  // Icon — Material Icon Theme <img> from icons/ directory (primary or fallback)
  const icon = document.createElement('span');
  icon.className = 'icon';
  var iconName;
  if (_miReady && _miMap) {
    iconName = _resolveMaterialIcon(node.name, node.isDir, node.expanded);
  } else {
    // Fallback: derive icon name from resolveIconId (strip "icon-" prefix)
    var iconId = node.isDir
      ? (node.expanded ? 'folder-open' : resolveIconId(node.name, true).replace(/^icon-/, ''))
      : resolveIconId(node.name, false).replace(/^icon-/, '');
    iconName = iconId;
  }
  var img = document.createElement('img');
  img.className = 'mi-icon';
  img.src = _miBase + iconName + '.svg';
  img.width = 16;
  img.height = 16;
  img.alt = '';
  img.loading = 'lazy';
  // Graceful fallback: if the SVG file doesn't exist, show a generic icon
  img.onerror = function() {
    var fallback = node.isDir ? 'folder' : 'file';
    if (this.src.indexOf(fallback + '.svg') === -1) {
      this.onerror = null;
      this.src = _miBase + fallback + '.svg';
    }
  };
  icon.appendChild(img);
  div.appendChild(icon);

  // Name
  const nameSpan = document.createElement('span');
  nameSpan.className = 'name';
  nameSpan.textContent = node.name;
  div.appendChild(nameSpan);

  // Item count badge for directories
  if (node.isDir) {
    var metaSpan = document.createElement('span');
    metaSpan.className = 'meta';
    var cnt = node.childCount || (node.children ? node.children.length : 0);
    metaSpan.textContent = cnt + (cnt === 1 ? ' item' : ' items');
    div.appendChild(metaSpan);
  }

  // Events
  div.addEventListener('click', (e) => onTreeNodeClick(e, node, div));
  div.addEventListener('dblclick', (e) => onTreeNodeDblClick(e, node));
  div.addEventListener('contextmenu', (e) => onTreeContextMenu(e, node));

  // Drag and drop (VS Code-style)
  div.draggable = true;
  div.addEventListener('dragstart', (e) => onDragStart(e, node));
  div.addEventListener('dragover', (e) => onDragOver(e, node, div));
  div.addEventListener('dragleave', (e) => onDragLeave(e, div));
  div.addEventListener('drop', (e) => onDrop(e, node, div));

  parent.appendChild(div);

  // Children (if expanded)
  if (node.isDir && node.expanded && node.children) {
    node.children.forEach(child => appendTreeNode(child, parent, depth + 1));
  }
}

function onTreeNodeClick(e, node, el) {
  e.stopPropagation();

  // Ensure the sidebar has focus for keyboard shortcuts to work
  var tree = document.getElementById('fileTree');
  if (tree && document.activeElement !== tree) {
    tree.focus({ preventScroll: true });
  }

  var nodes = _getVisibleTreeNodes();
  var clickedIdx = nodes.indexOf(el);
  if (clickedIdx < 0) clickedIdx = 0;

  // Shift+Click: range select from anchor to clicked item
  if (e.shiftKey && _shiftAnchorIndex >= 0) {
    e.preventDefault();
    var start = Math.min(_shiftAnchorIndex, clickedIdx);
    var end = Math.max(_shiftAnchorIndex, clickedIdx);
    // Clear previous selection unless Ctrl also held
    if (!e.ctrlKey) {
      document.querySelectorAll('.tree-node.selected').forEach(function(n) { n.classList.remove('selected'); });
      _treeMultiSelectPaths.clear();
    }
    for (var i = start; i <= end; i++) {
      nodes[i].classList.add('selected');
      _treeMultiSelectPaths.add(nodes[i].dataset.path);
    }
    selectedPath = node.path;
    // Don't update anchor on Shift+Click — keep original anchor
    return;
  }

  // Ctrl+Click: toggle multi-select for this node
  if (e.ctrlKey) {
    if (el.classList.contains('selected') && _treeMultiSelectPaths.size > 1) {
      // Deselect this one but keep others
      el.classList.remove('selected');
      _treeMultiSelectPaths.delete(node.path);
      var remaining = Array.from(_treeMultiSelectPaths);
      selectedPath = remaining.length > 0 ? remaining[remaining.length - 1] : null;
    } else {
      el.classList.add('selected');
      _treeMultiSelectPaths.add(node.path);
      selectedPath = node.path;
    }
    _shiftAnchorIndex = clickedIdx;
  } else {
    // Normal click: clear multi-select, select only this
    document.querySelectorAll('.tree-node.selected').forEach(function(n) { n.classList.remove('selected'); });
    _treeMultiSelectPaths.clear();
    el.classList.add('selected');
    _treeMultiSelectPaths.add(node.path);
    selectedPath = node.path;
    _shiftAnchorIndex = clickedIdx;
  }

  console.log('[Sidebar] onClick: selectedPath=' + selectedPath + ' isDir=' + node.isDir + ' name=' + node.name);

  if (node.isDir) {
    // Toggle expand/collapse
    node.expanded = !node.expanded;
    if (node.expanded) {
      expandedPaths.add(node.path);
      // Lazy-load children on first expand
      if ((!node.children || node.children.length === 0) && !node._childrenLoaded) {
        node._childrenLoaded = true;

        // 1. Check pre-loaded cache first (Python already pushed children)
        var cached = window._preloadedChildren && window._preloadedChildren[node.path];
        if (cached && cached.length > 0) {
          node.children = cached;
          node.childCount = cached.length;
          console.log('[Sidebar] Used preloaded children for', node.path, ':', cached.length, 'items');
          // No bridge call needed — just re-render
        } else {
          // 2. Store node reference for onLazyDirectoryTree to populate
          if (!window._lazyLoadNodes) window._lazyLoadNodes = {};
          window._lazyLoadNodes[node.path] = node;
          if (bridge && bridge.loadSubDirectory) {
            bridge.loadSubDirectory(node.path);
          } else {
            console.log('[Sidebar] bridge not ready for lazy-load — queuing retry for', node.path);
            if (!window._pendingLazyLoads) window._pendingLazyLoads = [];
            window._pendingLazyLoads.push(node.path);
          }
        }
      }
    } else {
      expandedPaths.delete(node.path);
    }
    // Re-render from root
    renderTree(fileTreeData, document.getElementById('fileTree'));
    // Restore focus to tree after re-render (QWebEngineView loses focus when DOM rebuilds)
    var treeEl = document.getElementById('fileTree');
    if (treeEl) treeEl.focus({ preventScroll: true });
    callBridge('onFolderToggle', node.path, node.expanded);
  } else {
    // Open file (single click preview)
    callBridge('onFileOpened', node.path);
    // If bridge isn't ready yet, queue the file open for when it becomes ready
    if (!bridge && node.path) {
      if (!window._pendingFileOpens) window._pendingFileOpens = [];
      if (window._pendingFileOpens.indexOf(node.path) === -1) {
        window._pendingFileOpens.push(node.path);
      }
    }
  }
}

function onTreeNodeDblClick(e, node) {
  if (!node.isDir) {
    callBridge('onFileDoubleClicked', node.path);
  }
}

// ─── VS Code-style Drag & Drop between directories ───

function onDragStart(e, node) {
  // Store source path(s) in dataTransfer
  var paths = _treeMultiSelectPaths.size > 0 && _treeMultiSelectPaths.has(node.path)
    ? Array.from(_treeMultiSelectPaths)
    : [node.path];
  e.dataTransfer.setData('text/plain', JSON.stringify(paths));
  e.dataTransfer.effectAllowed = 'copyMove';
  // Ctrl forces copy, otherwise move (cut)
  window._dragMode = e.ctrlKey ? 'copy' : 'cut';
  window._dragSourcePaths = paths;
  // Set drag image opacity
  if (e.target) {
    e.target.style.opacity = '0.5';
    setTimeout(function() { if (e.target) e.target.style.opacity = ''; }, 0);
  }
}

function onDragOver(e, node, div) {
  e.preventDefault();
  if (!node.isDir) {
    // Dropping on file: target is the parent directory
    e.dataTransfer.dropEffect = window._dragMode === 'copy' ? 'copy' : 'move';
  } else {
    e.dataTransfer.dropEffect = window._dragMode === 'copy' ? 'copy' : 'move';
  }
  div.classList.add('drag-over');
}

function onDragLeave(e, div) {
  div.classList.remove('drag-over');
}

function onDrop(e, node, div) {
  e.preventDefault();
  div.classList.remove('drag-over');

  var srcPaths = window._dragSourcePaths || [];
  var mode = window._dragMode || 'cut';
  window._dragSourcePaths = null;
  window._dragMode = null;

  if (!srcPaths.length) return;

  // Determine destination directory
  var destDir;
  if (node.isDir) {
    destDir = node.path;
  } else {
    // Dropped on a file — paste into its parent directory
    destDir = _getParentDir(node.path);
  }

  // Don't allow dropping into self
  if (srcPaths.indexOf(destDir) >= 0) {
    showToast('Cannot drop a folder into itself');
    return;
  }
  // Don't allow dropping into own children
  for (var i = 0; i < srcPaths.length; i++) {
    if (destDir.indexOf(srcPaths[i].replace(/\\/g, '/') + '/') === 0) {
      showToast('Cannot drop a folder into its own subfolder');
      return;
    }
  }

  // Confirm for multi-file cut (move) operations
  if (srcPaths.length > 1 && mode === 'cut' && bridge && bridge.showConfirmDialog) {
    bridge.showConfirmDialog('Confirm Move',
      'Are you sure you want to move these ' + srcPaths.length + ' items?',
      function(confirmed) {
        if (confirmed) {
          callBridge('onPaste', srcPaths, destDir, mode);
          document.querySelectorAll('.tree-node.cut').forEach(function(n) { n.classList.remove('cut'); });
          clipboardPaths = [];
          _treeMultiSelectPaths.clear();
          showToast('Moved ' + srcPaths.length + ' item(s)');
        }
      });
    return;
  }

  callBridge('onPaste', srcPaths, destDir, mode);
  // Clear cut indicators on source nodes
  document.querySelectorAll('.tree-node.cut').forEach(function(n) { n.classList.remove('cut'); });
  clipboardPaths = [];
  _treeMultiSelectPaths.clear();
  showToast(mode === 'copy' ? 'Copied ' + srcPaths.length + ' item(s)' : 'Moved ' + srcPaths.length + ' item(s)');
}

// Click on empty tree area (not a node) → clear multi-selection
function onTreeContainerClick(e) {
  if (e.target === e.currentTarget || e.target.id === 'fileTree') {
    document.querySelectorAll('.tree-node.selected').forEach(function(n) { n.classList.remove('selected'); });
    document.querySelectorAll('.tree-node.cut').forEach(function(n) { n.classList.remove('cut'); });
    _treeMultiSelectPaths.clear();
    selectedPath = null;
    _shiftAnchorIndex = -1;
  }
}

// Right-click on empty tree area (not a node) → show root-level context menu
function onTreeContainerContextMenu(e) {
  if (e.target === e.currentTarget || e.target.id === 'fileTree') {
    e.preventDefault();
    const items = [];
    // Paste to root: always available if clipboard has paths
    if (clipboardPaths.length > 0) {
      var dest = rootPath;
      if (dest) {
        var pathsToPaste = clipboardPaths.slice();
        var modeToPaste = clipboardMode;
        items.push({ label: '📥  Paste to Root', action: () => {
          callBridge('onPaste', pathsToPaste, dest, modeToPaste);
          document.querySelectorAll('.tree-node.cut').forEach(function(n) { n.classList.remove('cut'); });
          clipboardPaths = [];
          _treeMultiSelectPaths.clear();
          showToast(modeToPaste === 'cut' ? 'Moved to root' : 'Pasted to root');
          setTimeout(function() { if (rootPath) refreshTree(); }, 300);
        } });
        items.push({ separator: true });
      }
    }
    items.push({ label: '📄  New File', action: () => { pushNativeModal('newfile', rootPath || '', ''); } });
    items.push({ label: '📁  New Folder', action: () => { pushNativeModal('newfolder', rootPath || '', ''); } });
    items.push({ separator: true });
    items.push({ label: '🔄  Refresh', action: () => { if (rootPath) refreshTree(); } });
    showContextMenu(items, e.clientX, e.clientY);
    // Clear selection (consistent with VS Code empty-space click)
    document.querySelectorAll('.tree-node.selected').forEach(function(n) { n.classList.remove('selected'); });
    selectedPath = null;
  }
}

function onTreeContextMenu(e, node) {
  e.preventDefault();
  const items = [];
  const isDir = node.isDir;
  const path = node.path;

  if (isDir) {
    items.push({ label: '📄  New File', action: () => { pushNativeModal('newfile', path, ''); } });
    items.push({ label: '📁  New Folder', action: () => { pushNativeModal('newfolder', path, ''); } });
    items.push({ separator: true });
  } else if (/\.html?$/i.test(node.name || '')) {
    // Live Preview: renders the file inside Cortex's own embedded webview
    // (no external browser). Only offered for .html/.htm files.
    // Bug history: a direct bridge.openLivePreview(path) call bypassed
    // callBridge()'s bridge-not-ready queueing AND its error/warn logging —
    // clicks silently did nothing with zero trace in the log. callBridge
    // is the pattern every other sidebar action already uses.
    items.push({ label: '👁️  Open Live Preview', action: () => {
      console.log('[Sidebar] Open Live Preview clicked:', path);
      callBridge('openLivePreview', path);
    } });
    items.push({ separator: true });
  }

  // Cut/Copy: always available on the right-clicked node
  items.push({ label: '✂️  Cut', action: () => { clipboardPaths = [path]; clipboardMode = 'cut'; callBridge('copyToOSClipboard', JSON.stringify([path])); showToast('Cut ' + node.name); } });
  items.push({ label: '📋  Copy', action: () => { clipboardPaths = [path]; clipboardMode = 'copy'; callBridge('copyToOSClipboard', JSON.stringify([path])); showToast('Copied ' + node.name); } });
  items.push({ separator: true });

  // Paste from internal clipboard (Ctrl+C/X within sidebar)
  const canPaste = clipboardPaths.length > 0;
  if (canPaste) {
    const dest = isDir ? path : _getParentDir(path);
    var pathsToPaste = clipboardPaths.slice();
    var modeToPaste = clipboardMode;
    items.push({ label: '📥  Paste', action: () => {
      if (pathsToPaste.length > 1 && bridge && bridge.showConfirmDialog) {
        var action = modeToPaste === 'cut' ? 'move' : 'copy';
        bridge.showConfirmDialog('Confirm Paste',
          'Are you sure you want to ' + action + ' these ' + pathsToPaste.length + ' items?',
          function(confirmed) {
            if (confirmed) {
              callBridge('onPaste', pathsToPaste, dest, modeToPaste);
              document.querySelectorAll('.tree-node.cut').forEach(function(n) { n.classList.remove('cut'); });
              clipboardPaths = [];
              showToast(modeToPaste === 'cut' ? 'Moved' : 'Pasted');
              setTimeout(function() { if (rootPath) refreshTree(); }, 300);
            }
          });
      } else {
        callBridge('onPaste', pathsToPaste, dest, modeToPaste);
        document.querySelectorAll('.tree-node.cut').forEach(function(n) { n.classList.remove('cut'); });
        clipboardPaths = [];
        showToast(modeToPaste === 'cut' ? 'Moved' : 'Pasted');
        setTimeout(function() { if (rootPath) refreshTree(); }, 300);
      }
    } });
    items.push({ separator: true });
  }

  items.push({ label: '✏️  Rename', action: () => { pushNativeModal('rename', path, node.name); } });
  items.push({ label: '🗑️  Delete', action: () => { pushNativeModal('delete', path, node.name); } });
  items.push({ separator: true });
  items.push({ label: '🔗  Copy Path', action: () => {
    // Use callBridge which handles null bridge via polling fallback
    callBridge('copyFile', path);
    showToast('Path copied');
  } });

  showContextMenu(items, e.clientX, e.clientY);
}

// ─── AJAX: Instant tree updates without full refresh ──────────────

// Escape path for CSS attribute selector — handles Windows backslashes
function _escPath(p) { return p.replace(/\\/g, '\\\\').replace(/"/g, '\\"'); }

function removeTreeNode(path) {
  // Remove a single node from the tree without rebuilding
  var el = document.querySelector('[data-path="' + _escPath(path) + '"]');
  if (el) {
    el.remove();
    console.log('[Sidebar] AJAX removed: ' + path);
    // Also remove from expandedPaths if it was a directory
    expandedPaths.delete(path);
    // Remove from fileTreeData
    _removeFromTreeData(fileTreeData, path);
  }
}

function _removeFromTreeData(node, targetPath) {
  if (!node || !node.children) return;
  for (var i = node.children.length - 1; i >= 0; i--) {
    if (node.children[i].path === targetPath) {
      node.children.splice(i, 1);
      return true;
    }
    if (_removeFromTreeData(node.children[i], targetPath)) return true;
  }
  return false;
}

function addTreeNode(parentDir, name, isDir) {
  // Add a new node to the tree without rebuilding
  var parentEl = document.querySelector('[data-path="' + _escPath(parentDir) + '"]');
  if (!parentEl) {
    console.log('[Sidebar] AJAX add: parent not found, doing full refresh');
    refreshTree();
    return;
  }
  
  // Find the parent's children container
  var childrenContainer = parentEl.nextElementSibling;
  if (!childrenContainer || !childrenContainer.classList.contains('tree-children')) {
    // Parent not expanded — just mark it as having children
    if (parentEl.classList.contains('is-dir')) {
      var chevron = parentEl.querySelector('.chevron, .icon');
      if (chevron) chevron.innerHTML = '&#128193;'; // open folder icon
    }
    return;
  }
  
  // Handle both / and \ separators
  var sep = parentDir.includes('\\') ? '\\' : '/';
  var newPath = parentDir + (parentDir.endsWith('/') || parentDir.endsWith('\\') ? '' : sep) + name;
  
  // Check if already exists
  if (childrenContainer.querySelector('[data-path="' + _escPath(newPath) + '"]')) {
    return;
  }
  
  // Create new node
  var node = { name: name, path: newPath, isDir: isDir, children: [] };
  // Calculate correct depth from parent's paddingLeft (matches appendTreeNode)
  var parentPadding = parseInt(parentEl.style.paddingLeft) || 10;
  var parentDepth = Math.round((parentPadding - 10) / TREE_INDENT_PX);
  var childDepth = parentDepth + 1;
  var el = _createTreeNodeElement(node, childDepth);
  
  // Insert alphabetically
  var inserted = false;
  var existing = childrenContainer.querySelectorAll(':scope > .tree-node');
  for (var i = 0; i < existing.length; i++) {
    var existingName = existing[i].querySelector('.node-name');
    if (existingName && existingName.textContent.localeCompare(name) > 0) {
      childrenContainer.insertBefore(el, existing[i]);
      inserted = true;
      break;
    }
  }
  if (!inserted) {
    childrenContainer.appendChild(el);
  }
  
  // Update fileTreeData
  _addToTreeData(fileTreeData, parentDir, node);
  
  // Flash green highlight to show "new file"
  _flashNode(el, '#1a3a1a', 1500);
  
  console.log('[Sidebar] AJAX added: ' + newPath);
}

function renameTreeNode(oldPath, newName) {
  // Rename a node in the tree without rebuilding
  var el = document.querySelector('[data-path="' + _escPath(oldPath) + '"]');
  if (!el) {
    console.log('[Sidebar] AJAX rename: node not found, doing full refresh');
    refreshTree();
    return;
  }
  
  // Handle both / and \ separators
  var lastSlash = Math.max(oldPath.lastIndexOf('/'), oldPath.lastIndexOf('\\'));
  var parentPath = lastSlash > 0 ? oldPath.substring(0, lastSlash) : '';
  var sep = oldPath.includes('\\') ? '\\' : '/';
  var newPath = parentPath ? parentPath + sep + newName : newName;
  
  // Update DOM
  el.setAttribute('data-path', newPath);
  var nameEl = el.querySelector('.node-name');
  if (nameEl) nameEl.textContent = newName;
  
  // Update icon if extension changed — just update src, don't recreate element
  if (!el.classList.contains('is-dir')) {
    var iconEl = el.querySelector('.icon img.mi-icon');
    if (iconEl) {
      var iconName;
      if (typeof _miReady !== 'undefined' && _miReady && typeof _miMap !== 'undefined' && _miMap) {
        iconName = _resolveMaterialIcon(newName, false);
      } else {
        iconName = resolveIconId(newName, false).replace(/^icon-/, '');
      }
      iconEl.src = _miBase + iconName + '.svg';
    }
  }
  
  // Update fileTreeData
  _renameInTreeData(fileTreeData, oldPath, newPath, newName);
  
  // Flash blue highlight to show "renamed"
  _flashNode(el, '#1a2a3a', 1500);
  
  console.log('[Sidebar] AJAX renamed: ' + oldPath + ' → ' + newName);
}

function _renameInTreeData(node, oldPath, newPath, newName) {
  if (!node || !node.children) return false;
  for (var i = 0; i < node.children.length; i++) {
    if (node.children[i].path === oldPath) {
      node.children[i].path = newPath;
      node.children[i].name = newName;
      return true;
    }
    if (_renameInTreeData(node.children[i], oldPath, newPath, newName)) return true;
  }
  return false;
}

function _flashNode(el, color, duration) {
  // Flash a node with a brief background highlight — no CSS transition (causes alignment glitch)
  el.style.backgroundColor = color;
  setTimeout(function() {
    el.style.backgroundColor = '';
  }, duration);
}

function _addToTreeData(node, parentPath, newNode) {
  if (!node || !node.children) return false;
  if (node.path === parentPath) {
    node.children.push(newNode);
    return true;
  }
  for (var i = 0; i < node.children.length; i++) {
    if (_addToTreeData(node.children[i], parentPath, newNode)) return true;
  }
  return false;
}

// ─── File tree: Python → JS updates ───────────────────
function updateFileTree(jsonData) {
  try {
    var data = typeof jsonData === 'string' ? JSON.parse(jsonData) : jsonData;
    var entries = [];
    if (Array.isArray(data)) {
      entries = data;
    } else {
      entries = data.children || data.files || [];
      rootName = data.rootName || data.name || rootName;
    }
    document.getElementById('folderName').textContent = rootName;
    var newTree = buildFileTree(entries, rootPath);

    // SAFETY: Check if DOM container is empty even though fileTreeData has entries.
    // This happens when the DOM was cleared (e.g. webview re-render) but the JS
    // data model still has children. In that case, force a full re-render.
    var container = document.getElementById('fileTree');
    var domIsEmpty = container && container.children.length === 0;

    // INCREMENTAL UPDATE: merge new tree into existing tree without rebuilding.
    // Preserves expanded state and avoids flash.
    // BUT: if DOM is empty despite having data, force full re-render.
    if (!domIsEmpty && fileTreeData && fileTreeData.children && fileTreeData.children.length > 0) {
      _incrementalTreeUpdate(fileTreeData, newTree);
    } else {
      // First load OR DOM empty recovery — full render
      fileTreeData = newTree;
      renderTree(fileTreeData, container);
    }
  } catch(e) {
    console.error('[Sidebar] updateFileTree error:', e);
  }
}

// Incremental tree update: merge new tree into existing without full rebuild
function _incrementalTreeUpdate(oldTree, newTree) {
  var oldChildren = oldTree.children || [];
  var newChildren = newTree.children || [];
  var oldMap = {};
  oldChildren.forEach(function(c) { oldMap[c.path] = c; });
  var newMap = {};
  newChildren.forEach(function(c) { newMap[c.path] = c; });
  
  var container = document.getElementById('fileTree');
  var changed = false;
  
  // 1. Remove deleted nodes
  var toRemove = [];
  oldChildren.forEach(function(old) {
    if (!newMap[old.path]) {
      toRemove.push(old);
      changed = true;
    }
  });
  toRemove.forEach(function(old) {
    var el = container.querySelector('[data-path="' + _escPath(old.path) + '"]');
    if (el) el.remove();
    delete oldMap[old.path];
  });
  
  // 2. Add new nodes (insert at correct position)
  var addedPaths = [];
  newChildren.forEach(function(newNode, idx) {
    if (!oldMap[newNode.path]) {
      // Find insertion point
      var beforeEl = null;
      for (var j = idx + 1; j < newChildren.length; j++) {
        var nextEl = container.querySelector('[data-path="' + _escPath(newChildren[j].path) + '"]');
        if (nextEl) { beforeEl = nextEl; break; }
      }
      var nodeEl = _createTreeNodeElement(newNode, 0);
      if (beforeEl) {
        container.insertBefore(nodeEl, beforeEl);
      } else {
        container.appendChild(nodeEl);
      }
      addedPaths.push(newNode.path);
      changed = true;
    }
  });
  
  // 3. Update existing nodes (name, icon, git status)
  newChildren.forEach(function(newNode) {
    var oldNode = oldMap[newNode.path];
    if (oldNode) {
      var el = container.querySelector('[data-path="' + _escPath(newNode.path) + '"]');
      if (el) {
        // Update name if changed
        var nameEl = el.querySelector('.node-name');
        if (nameEl && nameEl.textContent !== newNode.name) {
          nameEl.textContent = newNode.name;
          changed = true;
        }
        // Update git status if changed
        if (oldNode.gitStatus !== newNode.gitStatus) {
          _updateNodeGitStatus(el, newNode);
          changed = true;
        }
      }
    }
  });
  
  // Update the data model
  oldTree.children = newChildren;
  fileTreeData = oldTree;
  
  if (changed) {
    console.log('[Sidebar] Incremental update: removed=' + toRemove.length + ', added=' + addedPaths.length);
  }
}

// Create a tree node DOM element (used by incremental update)
function _createTreeNodeElement(node, depth) {
  var div = document.createElement('div');
  div.className = 'tree-node' + (node.isDir ? ' is-dir' : ' is-file');
  div.setAttribute('data-path', node.path);
  div.setAttribute('role', 'treeitem');
  div.setAttribute('tabindex', '-1');
  div.dataset.path = node.path;
  div.dataset.isDir = node.isDir;
  // Use paddingLeft (same as appendTreeNode) instead of indent spans
  div.style.paddingLeft = (10 + depth * TREE_INDENT_PX) + 'px';

  // Icon
  var icon = document.createElement('span');
  icon.className = 'icon';
  if (node.isDir) {
    icon.innerHTML = expandedPaths.has(node.path) ? '&#128193;' : '&#128194;';
  } else {
    icon.innerHTML = getFileIcon(node.name, node.isDir);
  }
  div.appendChild(icon);

  // Name
  var name = document.createElement('span');
  name.className = 'node-name';
  name.textContent = node.name;
  div.appendChild(name);

  // Events — same as appendTreeNode
  div.addEventListener('click', function(e) { onTreeNodeClick(e, node, div); });
  div.addEventListener('dblclick', function(e) { onTreeNodeDblClick(e, node); });
  div.addEventListener('contextmenu', function(e) { onTreeContextMenu(e, node); });
  div.draggable = true;
  div.addEventListener('dragstart', function(e) { onDragStart(e, node); });
  div.addEventListener('dragover', function(e) { onDragOver(e, node, div); });
  div.addEventListener('dragleave', function(e) { onDragLeave(e, div); });
  div.addEventListener('drop', function(e) { onDrop(e, node, div); });

  return div;
}

// Update git status badge on a node
function _updateNodeGitStatus(el, node) {
  var badge = el.querySelector('.git-status-badge');
  if (node.gitStatus) {
    if (!badge) {
      badge = document.createElement('span');
      badge.className = 'git-status-badge';
      el.appendChild(badge);
    }
    badge.className = 'git-status-badge ' + node.gitStatus;
    badge.textContent = node.gitStatus.charAt(0).toUpperCase();
  } else if (badge) {
    badge.remove();
  }
}

// ── Explorer header toolbar buttons ──
function _getDefaultDir() {
    if (selectedPath) {
        var selNode = _findNodeInTree(fileTreeData, selectedPath);
        if (selNode) {
            // Node found — return parent dir if it's a file, itself if it's a dir
            return selNode.isDir ? selectedPath : _getParentDir(selectedPath);
        }
        // Node not found in tree — try to determine if it's a file or dir
        // If it has an extension, treat as file → return parent dir
        var ext = selectedPath.split('.').pop();
        if (ext && ext !== selectedPath && ext.length <= 5) {
            return _getParentDir(selectedPath);
        }
        return selectedPath;
    }
    if (rootPath) return rootPath;
    if (fileTreeData && fileTreeData.root) return fileTreeData.root;
    return '';
}

});

// ─── VS Code-style file tree keyboard nav helpers ───

// Get parent directory from a file path (handles both \ and /)
function _getParentDir(filePath) {
  var p = filePath.replace(/\\/g, '/');
  var lastSlash = p.lastIndexOf('/');
  if (lastSlash > 0) return filePath.substring(0, lastSlash);
  // No directory separator — return project root
  return rootPath || '';
}

// Get all visible .tree-node elements in DOM order
function _getVisibleTreeNodes() {
  var tree = document.getElementById('fileTree');
  return tree ? Array.from(tree.querySelectorAll('.tree-node')) : [];
}

// Find the index of .selected node in visible list
function _getSelectedIndex(nodes) {
  for (var i = 0; i < nodes.length; i++) {
    if (nodes[i].classList.contains('selected')) return i;
  }
  return -1;
}

// Select a tree node by index, scroll into view, update selectedPath
function _selectTreeNodeByIndex(index) {
  var nodes = _getVisibleTreeNodes();
  if (index < 0 || index >= nodes.length) return;
  var el = nodes[index];
  // Always clear to single-select (shift/ctrl paths handle multi-select themselves)
  nodes.forEach(function(n) { n.classList.remove('selected'); });
  _treeMultiSelectPaths.clear();
  el.classList.add('selected');
  selectedPath = el.dataset.path;
  _treeMultiSelectPaths.add(selectedPath);
  el.scrollIntoView({ block: 'nearest', behavior: 'auto' });
}

// Type-to-jump: find first visible node whose name starts with letter
function _jumpToLetter(letter) {
  var nodes = _getVisibleTreeNodes();
  var lower = letter.toLowerCase();
  var selIdx = _getSelectedIndex(nodes);
  // Search from after current selection, wrapping around
  for (var i = 1; i <= nodes.length; i++) {
    var idx = (selIdx + i) % nodes.length;
    var name = (nodes[idx].dataset.path || '').split(/[/\\]/).pop().toLowerCase();
    if (name.startsWith(lower)) {
      _selectTreeNodeByIndex(idx);
      return true;
    }
  }
  return false;
}

// ── Python-callable helpers (bypass broken JS keydown in QWebEngineView) ──
window._pyCopy = function() {
  if (!selectedPath) return;
  clipboardPaths = _treeMultiSelectPaths.size > 0 ? Array.from(_treeMultiSelectPaths) : [selectedPath];
  clipboardMode = 'copy';
  var name = selectedPath.split(/[/\\]/).pop();
  showToast('Copied ' + (_treeMultiSelectPaths.size > 1 ? _treeMultiSelectPaths.size + ' items' : name));
  callBridge('copyToOSClipboard', JSON.stringify(clipboardPaths));
  console.log('[Sidebar] _pyCopy: paths=' + clipboardPaths.length + ' mode=copy');
};
window._pyCut = function() {
  if (!selectedPath) return;
  clipboardPaths = _treeMultiSelectPaths.size > 0 ? Array.from(_treeMultiSelectPaths) : [selectedPath];
  clipboardMode = 'cut';
  var name = selectedPath.split(/[/\\]/).pop();
  showToast('Cut ' + (_treeMultiSelectPaths.size > 1 ? _treeMultiSelectPaths.size + ' items' : name));
  callBridge('copyToOSClipboard', JSON.stringify(clipboardPaths));
  document.querySelectorAll('.tree-node.selected').forEach(function(n) { n.classList.add('cut'); });
  console.log('[Sidebar] _pyCut: paths=' + clipboardPaths.length + ' mode=cut');
};
window._pyPaste = function() {
  if (!selectedPath) return;
  var selNode = _findNodeInTree(fileTreeData, selectedPath);
  var dest = selNode && selNode.isDir ? selectedPath : _getParentDir(selectedPath);
  if (clipboardPaths.length > 0) {
    var paths = clipboardPaths.slice();
    var mode = clipboardMode;
    callBridge('onPaste', paths, dest, mode);
    document.querySelectorAll('.tree-node.cut').forEach(function(n) { n.classList.remove('cut'); });
    clipboardPaths = [];
    _treeMultiSelectPaths.clear();
    showToast(mode === 'cut' ? 'Moved' : 'Pasted');
    console.log('[Sidebar] _pyPaste: paths=' + paths.length + ' dest=' + dest + ' mode=' + mode);
    setTimeout(function() { if (rootPath) refreshTree(); }, 300);
  }
};

// Keyboard shortcuts for file tree
// Ctrl+C = Copy, Ctrl+X = Cut, Ctrl+V = Paste, F2 = Rename, Delete = Delete
// Arrow Up/Down = Navigate, Ctrl+Arrows = Multi-select, Letters = Type-to-jump
// Ctrl+A = Select All, Space = Toggle folder, Enter = Open file
// Mirrors VS Code Explorer shortcuts exactly.
document.addEventListener('keydown', (e) => {
  // DEBUG: log ALL ctrl key combos to confirm handler is firing (unfiltered)
  if (e.ctrlKey) {
    console.log('[Sidebar] KEYDOWN ctrl+key=' + e.key + ' code=' + e.code + ' panel=' + currentPanel + ' sel=' + (selectedPath || 'null') + ' tag=' + (e.target.tagName || '?'));
  }
  if (currentPanel !== 0) return;
  // Ignore if focus is in an input (search, modal, rename)
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  // ── Ctrl+A: Select all visible files ──
  if (e.ctrlKey && e.key === 'a') {
    e.preventDefault();
    var nodes = _getVisibleTreeNodes();
    nodes.forEach(function(n) { n.classList.add('selected'); });
    _treeMultiSelectPaths.clear();
    nodes.forEach(function(n) { _treeMultiSelectPaths.add(n.dataset.path); });
    if (nodes.length > 0) {
      selectedPath = nodes[nodes.length - 1].dataset.path;
      _shiftAnchorIndex = 0;
    }
    return;
  }

  // ── Arrow Down: Next item ──
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    var nodes = _getVisibleTreeNodes();
    if (nodes.length === 0) return;

    // Shift+ArrowDown: move focus DOWN, select from anchor to focus
    if (e.shiftKey) {
      if (typeof _shiftFocusIndex === 'undefined') window._shiftFocusIndex = -1;
      if (_shiftAnchorIndex < 0) _shiftAnchorIndex = 0;
      if (_shiftFocusIndex < 0) _shiftFocusIndex = _shiftAnchorIndex;
      var newFocus = Math.min(_shiftFocusIndex + 1, nodes.length - 1);
      if (newFocus === _shiftFocusIndex) return; // already at bottom
      _shiftFocusIndex = newFocus;
      document.querySelectorAll('.tree-node.selected').forEach(function(n) { n.classList.remove('selected'); });
      _treeMultiSelectPaths.clear();
      var rangeStart = Math.min(_shiftAnchorIndex, _shiftFocusIndex);
      var rangeEnd = Math.max(_shiftAnchorIndex, _shiftFocusIndex);
      for (var i = rangeStart; i <= rangeEnd; i++) {
        nodes[i].classList.add('selected');
        _treeMultiSelectPaths.add(nodes[i].dataset.path);
      }
      selectedPath = nodes[_shiftFocusIndex].dataset.path;
      nodes[_shiftFocusIndex].scrollIntoView({ block: 'nearest', behavior: 'auto' });
      return;
    }

    // Normal Arrow: single select + set new anchor + reset focus
    var idx = _getSelectedIndex(nodes);
    var next = idx < nodes.length - 1 ? idx + 1 : 0;
    _selectTreeNodeByIndex(next);
    _shiftAnchorIndex = next;
    _shiftFocusIndex = next;
    return;
  }

  // ── Arrow Up: Previous item ──
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    var nodes = _getVisibleTreeNodes();
    if (nodes.length === 0) return;

    // Shift+ArrowUp: move focus UP, select from anchor to focus
    if (e.shiftKey) {
      if (typeof _shiftFocusIndex === 'undefined') window._shiftFocusIndex = -1;
      if (_shiftAnchorIndex < 0) _shiftAnchorIndex = nodes.length - 1;
      if (_shiftFocusIndex < 0) _shiftFocusIndex = _shiftAnchorIndex;
      var newFocus = Math.max(_shiftFocusIndex - 1, 0);
      if (newFocus === _shiftFocusIndex) return; // already at top
      _shiftFocusIndex = newFocus;
      document.querySelectorAll('.tree-node.selected').forEach(function(n) { n.classList.remove('selected'); });
      _treeMultiSelectPaths.clear();
      var rangeStart = Math.min(_shiftAnchorIndex, _shiftFocusIndex);
      var rangeEnd = Math.max(_shiftAnchorIndex, _shiftFocusIndex);
      for (var i = rangeStart; i <= rangeEnd; i++) {
        nodes[i].classList.add('selected');
        _treeMultiSelectPaths.add(nodes[i].dataset.path);
      }
      selectedPath = nodes[_shiftFocusIndex].dataset.path;
      nodes[_shiftFocusIndex].scrollIntoView({ block: 'nearest', behavior: 'auto' });
      return;
    }

    // Normal Arrow: single select + set new anchor + reset focus
    var idx = _getSelectedIndex(nodes);
    var prev = idx > 0 ? idx - 1 : nodes.length - 1;
    _selectTreeNodeByIndex(prev);
    _shiftAnchorIndex = prev;
    _shiftFocusIndex = prev;
    return;
  }

  // ── Space: Toggle folder expand/collapse ──
  if (e.key === ' ') {
    e.preventDefault();
    if (!selectedPath) return;
    var selNode = _findNodeInTree(fileTreeData, selectedPath);
    if (selNode && selNode.isDir) {
      selNode.expanded = !selNode.expanded;
      if (selNode.expanded) {
        expandedPaths.add(selNode.path);
        if ((!selNode.children || selNode.children.length === 0) && !selNode._childrenLoaded) {
          selNode._childrenLoaded = true;
          if (!window._lazyLoadNodes) window._lazyLoadNodes = {};
          window._lazyLoadNodes[selNode.path] = selNode;
          if (bridge && bridge.loadSubDirectory) bridge.loadSubDirectory(selNode.path);
        }
      } else {
        expandedPaths.delete(selNode.path);
      }
      renderTree(fileTreeData, document.getElementById('fileTree'));
      callBridge('onFolderToggle', selNode.path, selNode.expanded);
    }
    return;
  }

  // ── Enter: Open selected file ──
  if (e.key === 'Enter') {
    e.preventDefault();
    if (!selectedPath) return;
    var selNode = _findNodeInTree(fileTreeData, selectedPath);
    if (selNode && selNode.isDir) {
      selNode.expanded = !selNode.expanded;
      if (selNode.expanded) expandedPaths.add(selNode.path);
      else expandedPaths.delete(selNode.path);
      renderTree(fileTreeData, document.getElementById('fileTree'));
      callBridge('onFolderToggle', selNode.path, selNode.expanded);
    } else {
      callBridge('onFileOpened', selectedPath);
    }
    return;
  }

  // ── Delete key: delete selected file(s) via native PyQt modal ──
  if (e.key === 'Delete') {
    e.preventDefault();
    var paths = _treeMultiSelectPaths.size > 0 ? Array.from(_treeMultiSelectPaths) : (selectedPath ? [selectedPath] : []);
    if (paths.length === 0) return;
    if (paths.length === 1) {
      // Single file: same flow as right-click context menu
      var name = paths[0].split(/[/\\]/).pop();
      pushNativeModal('delete', paths[0], name);
    } else {
      // Multi-select: pass paths as JSON array in 'path', label in 'name'
      pushNativeModal('deleteMulti', JSON.stringify(paths), paths.length + ' items');
    }
    return;
  }

  // ── Type-to-jump: single letter finds file starting with that letter ──
  if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) {
    var letter = e.key;
    if (_treeNavLetterTimer) clearTimeout(_treeNavLetterTimer);
    _treeNavLetterBuffer += letter;
    _treeNavLetterTimer = setTimeout(function() { _treeNavLetterBuffer = ''; }, 800);
    // Try multi-char buffer first, then single letter fallback
    if (!_jumpToLetter(_treeNavLetterBuffer)) {
      _jumpToLetter(letter);
    }
    return;
  }

  // ── Ctrl+C: Copy ──
  if (e.ctrlKey && e.key === 'c') {
    e.preventDefault();
    window._pyCopy();
  }
  
  // ── Ctrl+X: Cut ──
  if (e.ctrlKey && e.key === 'x') {
    e.preventDefault();
    window._pyCut();
  }

  // ── Ctrl+V: Paste ──
  if (e.ctrlKey && e.key === 'v') {
    e.preventDefault();
    if (!selectedPath) return;

    var selNode = _findNodeInTree(fileTreeData, selectedPath);
    var dest = selNode && selNode.isDir ? selectedPath : _getParentDir(selectedPath);

    // If we have internal clipboard paths (from Ctrl+C/X within sidebar), use those
    if (clipboardPaths.length > 0) {
      window._pyPaste();
      return;
    }

    // Otherwise, try the OS clipboard (files from Windows Explorer or other apps)
    if (bridge && bridge.getOSClipboardFiles) {
      bridge.getOSClipboardFiles(function(jsonStr) {
        try {
          var osPaths = typeof jsonStr === 'string' ? JSON.parse(jsonStr) : jsonStr;
          if (osPaths && osPaths.length > 0) {
            if (osPaths.length > 1 && bridge && bridge.showConfirmDialog) {
              bridge.showConfirmDialog('Confirm Paste',
                'Are you sure you want to copy these ' + osPaths.length + ' items from clipboard?',
                function(confirmed) {
                  if (confirmed) {
                    callBridge('onPaste', osPaths, dest, 'copy');
                    showToast('Pasted ' + osPaths.length + ' item(s) from clipboard');
                  }
                });
            } else {
              callBridge('onPaste', osPaths, dest, 'copy');
              showToast('Pasted ' + osPaths.length + ' item(s) from clipboard');
            }
          }
        } catch(err) {
          console.warn('[Sidebar] getOSClipboardFiles parse error:', err);
        }
      });
    }
  }

  // ── Backspace: Delete selected (Delete key handled above) ──
  if (e.key === 'Backspace') {
    e.preventDefault();
    var paths = _treeMultiSelectPaths.size > 0 ? Array.from(_treeMultiSelectPaths) : (selectedPath ? [selectedPath] : []);
    if (paths.length === 0) return;
    if (paths.length === 1) {
      var name = paths[0].split(/[/\\]/).pop();
      pushNativeModal('delete', paths[0], name);
    } else {
      pushNativeModal('deleteMulti', JSON.stringify(paths), paths.length + ' items');
    }
  }

  // ── F2: Rename (handled by Python eventFilter in sidebar.py) ──
  // NOTE: Python's eventFilter catches F2 at the Qt level and pushes to
  // _pendingNativeModals. This JS handler is disabled to avoid double-push
  // which caused the rename dialog to appear twice.

  // ── Ctrl+Shift+N: New File ──
  if (e.ctrlKey && e.shiftKey && e.key === 'N') {
    e.preventDefault();
    if (selectedPath) {
      var selNode = _findNodeInTree(fileTreeData, selectedPath);
      var dest = selNode && selNode.isDir ? selectedPath : _getParentDir(selectedPath);
      pushNativeModal('newfile', dest, '');
    }
  }
});

function displaySearchResults(results) {
  const container = document.getElementById('searchResults');
  const status = document.getElementById('searchStatus');
  const data = typeof results === 'string' ? JSON.parse(results) : results;

  // Deduplicate by normalized path — same file appears only once
  var seen = {};
  var deduped = [];
  if (data && data.length) {
    for (var di = 0; di < data.length; di++) {
      var dp = (data[di].path || '').replace(/\\/g, '/').toLowerCase().replace(/\/$/, '');
      if (!seen[dp]) { seen[dp] = true; deduped.push(data[di]); }
    }
  }
  searchResults = deduped;

  container.innerHTML = '';
  if (!deduped || deduped.length === 0) {
    status.textContent = 'No results found';
    return;
  }

  // Safe DOM construction for status
  status.textContent = '';
  const statusDot = document.createElement('span');
  statusDot.className = 'status-dot active';
  status.appendChild(statusDot);
  status.appendChild(document.createTextNode(deduped.length + ' result' + (deduped.length !== 1 ? 's' : '')));

  deduped.forEach(r => {
    const div = document.createElement('div');
    div.className = 'search-result';
    div.title = r.path || '';

    const icon = document.createElement('span');
    icon.className = 'match-icon';
    if (_miReady && _miMap) {
      var iconName = _resolveMaterialIcon(r.name || r.path?.split('/').pop() || '', r.isDir || false);
      var img = document.createElement('img');
      img.className = 'mi-icon';
      img.src = _miBase + iconName + '.svg';
      img.width = 14; img.height = 14; img.alt = '';
      icon.appendChild(img);
    } else {
      const iconId = resolveIconId(r.name || r.path?.split('/').pop() || '', r.isDir || false);
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      const use = document.createElementNS('http://www.w3.org/2000/svg', 'use');
      use.setAttribute('href', '#' + iconId);
      svg.appendChild(use);
      icon.appendChild(svg);
    }
    div.appendChild(icon);

    const name = document.createElement('span');
    name.className = 'match-filename';
    name.textContent = r.name || r.path?.split(/[\/\\]/).pop() || '';
    div.appendChild(name);

    if (r.lineNum) {
      const ln = document.createElement('span');
      ln.className = 'match-line-num';
      ln.textContent = `L${r.lineNum}`;
      div.appendChild(ln);
    }

    // Path is available via hover tooltip (div.title set above) — no inline path display

    div.addEventListener('click', () => {
      if (r.lineNum) callBridge('onFileSearchOpened', r.path, r.lineNum);
      else callBridge('onFileOpened', r.path);
    });
    container.appendChild(div);
  });
}

function updateGitFiles(jsonData) {
  try {
    var data = typeof jsonData === 'string' ? JSON.parse(jsonData) : jsonData;
    var changesEl = document.getElementById('gitChanges');
    var emptyMsg = document.getElementById('gitEmptyMsg');
    var infoBar = document.getElementById('gitInfoBar');
    var countEl = document.getElementById('gitCount');
    var branchEl = document.getElementById('gitBranchName');
    var unstagedEl = document.getElementById('gitUnstaged');
    var untrackedEl = document.getElementById('gitUntracked');
    var stagedEl = document.getElementById('gitStaged');
    var unstagedCountEl = document.getElementById('gitUnstagedCount');
    var untrackedCountEl = document.getElementById('gitUntrackedCount');
    var stagedCountEl = document.getElementById('gitStagedCount');

    if (data.error) {
      if (emptyMsg) { emptyMsg.style.display = 'flex'; emptyMsg.querySelector('div').textContent = data.error; }
      if (infoBar) infoBar.style.display = 'none';
      if (countEl) countEl.textContent = '';
      return;
    }

    var files = data.files || [];
    if (branchEl) branchEl.textContent = data.branch || 'detached';
    if (countEl) countEl.textContent = '(' + files.length + ')';

    // Count by category
    var unstaged = files.filter(f => f.status === 'modified');
    var untracked = files.filter(f => f.status === 'untracked');
    var staged = files.filter(f => f.status === 'added' || f.status === 'renamed');
    var deleted = files.filter(f => f.status === 'deleted');

    if (unstagedEl) unstagedEl.style.display = unstaged.length ? 'inline-flex' : 'none';
    if (unstagedCountEl) unstagedCountEl.textContent = unstaged.length;
    if (untrackedEl) untrackedEl.style.display = untracked.length ? 'inline-flex' : 'none';
    if (untrackedCountEl) untrackedCountEl.textContent = untracked.length;
    if (stagedEl) stagedEl.style.display = staged.length ? 'inline-flex' : 'none';
    if (stagedCountEl) stagedCountEl.textContent = staged.length;
    if (infoBar) infoBar.style.display = files.length ? 'block' : 'none';

    // Render file list
    if (!files.length) {
      changesEl.innerHTML = '';
      changesEl.appendChild(emptyMsg || document.createElement('div'));
      if (emptyMsg) { emptyMsg.style.display = 'flex'; emptyMsg.querySelector('div').textContent = 'No changes'; }
      return;
    }

    if (emptyMsg) emptyMsg.style.display = 'none';
    changesEl.innerHTML = '';

    files.forEach(function(f) {
      var div = document.createElement('div');
      div.className = 'git-file';
      div.dataset.testid = 'git-file';
      var badge = f.status === 'untracked' ? 'U' : f.status === 'modified' ? 'M' : f.status === 'deleted' ? 'D' : f.status === 'added' ? 'A' : 'R';
      var badgeClass = f.status;

      // Badge (safe DOM creation)
      var badgeSpan = document.createElement('span');
      badgeSpan.className = 'git-badge ' + badgeClass;
      badgeSpan.textContent = badge;
      div.appendChild(badgeSpan);

      // File name (safe textContent)
      var fnameSpan = document.createElement('span');
      fnameSpan.className = 'fname';
      fnameSpan.title = f.path;
      fnameSpan.textContent = f.path.split(/[/\\]/).pop();
      div.appendChild(fnameSpan);

      // Counts (safe DOM creation)
      if (f.additions !== undefined || f.deletions !== undefined) {
        var countsSpan = document.createElement('span');
        countsSpan.className = 'git-counts';
        if (f.additions > 0) {
          var addSpan = document.createElement('span');
          addSpan.className = 'git-add';
          addSpan.textContent = '+' + f.additions;
          countsSpan.appendChild(addSpan);
        }
        if (f.deletions > 0) {
          var delSpan = document.createElement('span');
          delSpan.className = 'git-del';
          delSpan.textContent = '-' + f.deletions;
          countsSpan.appendChild(delSpan);
        }
        div.appendChild(countsSpan);
      }

      changesEl.appendChild(div);
    });
  } catch(e) {
    console.error('[Sidebar] updateGitFiles error:', e);
  }
}

// Helper: recursively find a node in fileTreeData by path
function _findNodeInTree(tree, targetPath) {
  if (!tree || !targetPath) return null;
  var norm = targetPath.replace(/\\/g, '/').toLowerCase();
  var stack = [{ children: tree.children || (Array.isArray(tree) ? tree : []) }];
  while (stack.length > 0) {
    var kids = stack.pop().children;
    if (!kids) continue;
    for (var i = 0; i < kids.length; i++) {
      var c = kids[i];
      var cPath = (c.path || '').replace(/\\/g, '/').toLowerCase();
      if (cPath === norm) return c;
      if (c.children && c.children.length > 0) stack.push({ children: c.children });
    }
  }
  return null;
}

// These are exposed as methods on the JS side that Python can invoke

  updateFileTree: function(jsonData) { updateFileTree(jsonData); },

  showModal: function(title, value) { showModal(title, value); },
  // Called by Python search workers with results
  onSearchResults: function(results) { displaySearchResults(results); },
  // Called by Python to refresh the file tree
  refreshTree: function() { if (typeof refreshTree === 'function') { refreshTree(); } },
  // Alias: Python refreshGitStatus calls this name
  updateGitStatus: function(jsonData) { updateGitFiles(jsonData); },
  // Called by Python loadDirectoryTree → pushes tree data
  // rootDir (optional): the project/directory root — sets global rootPath if provided
  onDirectoryTree: function(treeData, rootDir) {
    try {
      var entries = typeof treeData === 'string' ? JSON.parse(treeData) : treeData;
      console.log('[Sidebar] onDirectoryTree received', Array.isArray(entries) ? entries.length : 'object', 'entries, rootDir:', rootDir);
      // CRITICAL: set rootPath from rootDir if provided (fixes toolbar buttons)
      if (rootDir && !rootPath) {
        rootPath = rootDir;
        rootName = rootDir.split(/[/\\]/).filter(Boolean).pop() || 'Project';
        var lbl = document.getElementById('folderName');
        if (lbl) lbl.textContent = rootName;
        console.log('[Sidebar] onDirectoryTree set rootPath =', rootPath);
      }
      updateFileTree(entries);
      // Invoke stored callback if any (set by loadDirectoryTree)
      if (window._treeLoadCallback) {
        var cb = window._treeLoadCallback;
        window._treeLoadCallback = null;
        cb(entries);
      }
    } catch(e) {
      console.error('[Sidebar] onDirectoryTree parse error:', e);
    }
  },
  // Called by Python loadSubDirectory → adds children to a specific node
  onLazyDirectoryTree: function(dirPath, childEntries) {
    try {
      var entries = typeof childEntries === 'string' ? JSON.parse(childEntries) : childEntries;
      console.log('[Sidebar] onLazyDirectoryTree received for', dirPath, ':', (entries || []).length, 'children');
      var mapped = (entries || []).map(function(e) {
        return {
          name: e.name, path: e.path, isDir: e.isDir,
          size: e.size || 0, modTime: e.modified || e.modTime || '',
          childCount: e.childCount || 0,
          children: e.isDir ? [] : null,
          expanded: false, _childrenLoaded: false
        };
      });

      // 1. Try clicked-node cache (_lazyLoadNodes populated by onTreeNodeClick)
      var node = window._lazyLoadNodes && window._lazyLoadNodes[dirPath];
      if (node) {
        node.children = mapped;
        node.childCount = mapped.length;
        delete window._lazyLoadNodes[dirPath];
        if (fileTreeData) renderTree(fileTreeData, document.getElementById('fileTree'));
        return;
      }

      // 2. Pre-load cache: search fileTreeData recursively for the node
      if (fileTreeData) {
        var found = _findNodeInTree(fileTreeData, dirPath);
        if (found) {
          found.children = mapped;
          found.childCount = mapped.length;
          found._childrenLoaded = true;
          console.log('[Sidebar] onLazyDirectoryTree: populated node via tree search for', dirPath);
        }
      }

      // 3. Store in global preload cache so onTreeNodeClick can skip bridge call
      if (!window._preloadedChildren) window._preloadedChildren = {};
      window._preloadedChildren[dirPath] = mapped;
    } catch(e) {
      console.error('[Sidebar] onLazyDirectoryTree error:', e);
    }
  },
  // Called by Python when project path changes
  onProjectChanged: function(path) {
    console.log('[Sidebar] onProjectChanged:', path);
    if (path) {
      rootPath = path;
      rootName = path.split(/[/\\]/).filter(Boolean).pop() || 'Project';
      var lbl = document.getElementById('folderName');
      if (lbl) lbl.textContent = rootName;
      console.log('[Sidebar] onProjectChanged — loading tree for:', path);
      loadDirectoryTree(path);
      // Auto-refresh git status when project changes
      callBridge('refreshGitStatus', path);
    }
  },

  };

/* ── Custom themed tooltips — document-wide delegation ──────────────
   Bug history: a bare `title=""` attribute is rendered by Chromium's OWN
   native OS tooltip — completely outside this page's CSS and data-theme.
   It always showed as a dark box regardless of the active theme. A first
   fix only pre-scanned `.icon-btn[title]` at load time, so it missed every
   title set LATER by JS on dynamically created elements — search result
   rows (div.title = r.path) and file-tree name spans (fnameSpan.title =
   f.path) still showed the native dark tooltip when hovered.
   Fix: a single delegated mouseover/mouseout on document catches ANY
   element with a title attribute, present now or added later, moves it
   into data-tip, deletes the attribute so Chromium's tooltip never fires,
   and shows/positions this themed div instead. */
(function() {
    var tip = document.createElement('div');
    tip.id = 'iconTooltip';
    document.body.appendChild(tip);

    function showTip(el) {
        var r = el.getBoundingClientRect();
        tip.textContent = el.getAttribute('data-tip');
        tip.style.display = 'block';
        var left = r.right + 8;
        // Keep on-screen if the element is near the right edge
        if (left + tip.offsetWidth > window.innerWidth) {
            left = Math.max(4, r.left - tip.offsetWidth - 8);
        }
        tip.style.left = left + 'px';
        tip.style.top = Math.round(r.top + r.height / 2 - tip.offsetHeight / 2) + 'px';
    }

    document.addEventListener('mouseover', function(e) {
        var el = e.target.closest('[title]');
        if (!el) return;
        var text = el.getAttribute('title');
        el.setAttribute('data-tip', text);
        el.removeAttribute('title');
        showTip(el);
    });
    document.addEventListener('mouseout', function(e) {
        var el = e.target.closest('[data-tip]');
        if (!el) return;
        var related = e.relatedTarget;
        if (related && el.contains(related)) return;  // moved to a child — stay open
        tip.style.display = 'none';
    });
    document.addEventListener('click', function() {
        tip.style.display = 'none';
    });
})();

  </script>
</body>

</html>
