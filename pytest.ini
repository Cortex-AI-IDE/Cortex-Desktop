[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests (fast, no GUI, no network)
    integration: Integration tests (cross-module, may use filesystem)
    gui: GUI tests (PyQt6 widgets, requires display)
    e2e: End-to-end tests (full application workflow)
    property: Property-based tests (Hypothesis)
    smoke: Smoke tests (quick sanity checks)
    performance: Performance/benchmark tests
    security: Security audit tests
    regression: Regression tests for known bugs
    slow: Tests that take > 5 seconds
timeout = 30
addopts =
    -v
    --tb=short
    --strict-markers
